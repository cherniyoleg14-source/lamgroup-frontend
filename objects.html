<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Объекты | LamGroup</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #F8FAFC; padding: 16px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .app-header h1 { font-size: 24px; font-weight: 800; color: #0F172A; letter-spacing: -0.5px; }
        .logo-badge { background: linear-gradient(135deg, #F59E0B, #F97316); color: white; padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .role-badge { background: #E2E8F0; color: #0F172A; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; border: 1.5px solid #E2E8F0; background: white; color: #64748B; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #0F172A; color: white; border-color: #0F172A; }
        .objects-grid { display: flex; flex-direction: column; gap: 12px; }
        .object-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid #F1F5F9; }
        .object-card:active { transform: scale(0.99); }
        .object-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .object-name { font-size: 16px; font-weight: 700; color: #0F172A; }
        .object-status { padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .status-preparation { background: #FEF3C7; color: #92400E; } .status-mobilization { background: #DBEAFE; color: #1E40AF; } .status-in_progress { background: #D1FAE5; color: #065F46; } .status-completed { background: #E2E8F0; color: #475569; }
        .object-address { font-size: 13px; color: #64748B; margin-bottom: 8px; }
        .progress-section { margin: 12px 0; } .progress-bar { height: 6px; background: #F1F5F9; border-radius: 30px; overflow: hidden; } .progress-fill { height: 100%; background: linear-gradient(90deg, #0F172A, #F59E0B); border-radius: 30px; width: 0%; }
        .object-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #F1F5F9; font-size: 12px; color: #64748B; }
        .object-sum { font-size: 13px; font-weight: 600; color: #0F172A; margin-top: 6px; }
        .back-btn { background: none; border: none; color: #0F172A; font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 0; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .tabs-wrapper { position: relative; margin: 16px 0; }
        .tabs { display: flex; gap: 4px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 6px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 12px; background: none; border: none; font-weight: 600; color: #64748B; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .tab.active { color: #0F172A; border-bottom: 3px solid #F59E0B; }
        .scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: white; border: 1px solid #E2E8F0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; font-size: 16px; font-weight: 700; color: #0F172A; }
        .scroll-arrow.left { left: -15px; } .scroll-arrow.right { right: -15px; } .scroll-arrow.hidden { display: none; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .info-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #F1F5F9; }
        .form-group { margin-bottom: 14px; } label { font-weight: 600; color: #475569; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 14px; font-size: 14px; background: white; font-family: 'Inter', sans-serif; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn-primary { width: 100%; background: linear-gradient(135deg, #0F172A, #1E293B); color: white; padding: 14px; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-secondary { background: #F8FAFC; color: #0F172A; padding: 8px 14px; border-radius: 12px; font-weight: 600; border: 1.5px solid #E2E8F0; cursor: pointer; font-size: 12px; }
        .btn-small { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
        .btn-edit { background: #FEF3C7; color: #92400E; } .btn-delete { background: #FEE2E2; color: #991B1B; } .btn-add { background: #DBEAFE; color: #1E40AF; }
        .btn-pdf { background: #F3E8FF; color: #6B21A8; padding: 6px 12px; border-radius: 10px; font-weight: 600; border: 1px solid #D8B4FE; cursor: pointer; font-size: 12px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px 20px; color: #64748B; }
        .empty-state { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; color: #64748B; }
        .message { padding: 14px; border-radius: 14px; margin: 14px 0; display: none; font-weight: 500; font-size: 14px; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; } .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .gpr-item { background: white; border-radius: 16px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #F1F5F9; }
        .axis-card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1.5px solid #E2E8F0; }
        .axis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .axis-name { font-weight: 700; color: #0F172A; font-size: 15px; }
        .axis-dates { font-size: 12px; color: #64748B; margin-bottom: 8px; }
        .brigade-section { background: #F8FAFC; border-radius: 14px; padding: 14px; margin: 10px 0; border: 1px solid #E2E8F0; }
        .brigade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .brigade-name { font-weight: 600; color: #0F172A; font-size: 14px; }
        .work-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 6px 0; }
        .work-table th { text-align: left; padding: 6px; background: #F1F5F9; color: #475569; font-weight: 600; font-size: 10px; }
        .work-table td { padding: 6px; border-bottom: 1px solid #F1F5F9; }
        .work-table .text-right { text-align: right; }
        .progress-input { width: 55px; padding: 5px 6px; border-radius: 8px; border: 1px solid #E2E8F0; text-align: center; font-size: 12px; }
        .status-badge-sm { padding: 3px 6px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .status-in_progress-sm { background: #D1FAE5; color: #065F46; } .status-pending-sm { background: #FEF3C7; color: #92400E; } .status-completed-sm { background: #E2E8F0; color: #475569; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10002; }
        .modal.hidden { display: none !important; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 800; color: #0F172A; }
        .close-btn { background: #F1F5F9; border: none; width: 36px; height: 36px; border-radius: 36px; font-size: 18px; cursor: pointer; color: #64748B; display: flex; align-items: center; justify-content: center; }
        .action-menu-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 16px; z-index: 10003; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 10002; }
        .action-item { padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .fullscreen-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F8FAFC; z-index: 10001; overflow-y: auto; padding: 16px; }
        .letter-preview { background: white; border: 2px solid #0F172A; padding: 30px; font-family: 'Times New Roman', serif; font-size: 14px; line-height: 1.6; max-width: 800px; margin: 0 auto; }
        .letter-logo { font-size: 32px; font-weight: 800; color: #0F172A; letter-spacing: 6px; text-align: center; margin-bottom: 5px; }
        .letter-subtitle { font-size: 14px; letter-spacing: 8px; text-align: center; color: #F59E0B; font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="list-view">
            <div class="app-header"><h1>LamGroup <span class="logo-badge">Construction</span></h1><span class="role-badge" id="role-badge"></span></div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="my">Мои</button>
                <button class="filter-btn" data-filter="preparation">Подготовка</button><button class="filter-btn" data-filter="in_progress">В работе</button><button class="filter-btn" data-filter="completed">Завершён</button>
            </div>
            <div id="objects-container"><div class="loading">Загрузка объектов...</div></div>
        </div>
        <div id="detail-view" class="hidden">
            <button class="back-btn" id="back-btn">← Назад</button>
            <div class="app-header"><h1 id="detail-name"></h1><span class="role-badge" id="detail-status-badge"></span></div>
            <div class="tabs-wrapper">
                <div class="scroll-arrow left hidden" id="scroll-left">←</div>
                <div class="tabs" id="tabs-container">
                    <button class="tab active" data-tab="info">📋 Инфо</button>
                    <button class="tab" data-tab="progress">📊 Прогресс</button>
                    <button class="tab" data-tab="history">📜 История</button>
                    <button class="tab" data-tab="expenses">💰 Расходы</button>
                    <button class="tab" data-tab="materials">📦 Материалы</button>
                    <button class="tab" data-tab="checklist">✅ Чек-лист</button>
                    <button class="tab" data-tab="issues">⚠️ Проблемы</button>
                    <button class="tab" data-tab="report">📑 Отчет</button>
                </div>
                <div class="scroll-arrow right" id="scroll-right">→</div>
            </div>
            <div id="tab-info" class="tab-content active"><div class="info-card" id="detail-content"></div></div>
            <div id="tab-progress" class="tab-content"><div id="progress-container"></div></div>
            <div id="tab-history" class="tab-content"><div id="history-container"></div></div>
            <div id="tab-expenses" class="tab-content"><div class="info-card"><h3>💰 Расходы</h3><p>Загрузка...</p></div></div>
            <div id="tab-materials" class="tab-content"><div id="materials-container"></div></div>
            <div id="tab-checklist" class="tab-content"><div class="info-card"><h3>✅ Чек-лист</h3><p>Загрузка...</p></div></div>
            <div id="tab-issues" class="tab-content"><div class="info-card"><h3>⚠️ Проблемы</h3><p>Загрузка...</p></div></div>
            <div id="tab-report" class="tab-content"><div class="info-card"><h3>📑 Отчет</h3><p>Загрузка...</p></div></div>
        </div>
        <div id="axis-detail-page" class="fullscreen-modal hidden"></div>
        <div id="action-overlay" class="action-overlay hidden"></div>
        <div id="action-menu" class="action-menu-modal hidden"></div>
        <div id="form-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="form-modal-title"></span><button class="close-btn" id="close-form-modal">&times;</button></div><div id="form-modal-content"></div></div></div>
        <div id="edit-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="edit-modal-title"></span><button class="close-btn" id="close-edit-modal">&times;</button></div><div id="edit-modal-content"></div><button class="btn-primary" id="save-edit-btn">Сохранить</button></div></div>
        <div id="message" class="message"></div>
    </div>

    <script>
        window.closeActionMenu = function() { var m=document.getElementById('action-menu'); var o=document.getElementById('action-overlay'); if(m)m.classList.add('hidden'); if(o)o.classList.add('hidden'); };
        window.closeAxisDetailPage = function() { var p=document.getElementById('axis-detail-page'); if(p)p.classList.add('hidden'); if(window._loadProgressTab)window._loadProgressTab(); };
        window.formatDate = function(dateStr) { if(!dateStr) return '—'; var d = new Date(dateStr); return d.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}); };
        window.formatDateShort = function(dateStr) { if(!dateStr) return '—'; var d = new Date(dateStr); return d.toLocaleDateString('ru-RU'); };

        (function() {
            const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
            const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let userId = tg.initDataUnsafe?.user?.id; if (!userId) { alert('Ошибка авторизации'); return; }
            let currentUser = null, currentRole = 'worker', currentProjectId = null, currentFilter = 'all', allProjects = [], allBrigades = [], allWorkStages = [];
            let currentAxisId = null;

            function showMessage(text, type) { const msg = document.getElementById('message'); msg.textContent = text; msg.className = 'message '+type; setTimeout(function(){ msg.className = 'message'; }, 3000); }
            function escapeHtml(text) { if (!text) return ''; return String(text).replace(/[&<>]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c] || c; }); }

            async function init() { await loadUser(); await loadBrigades(); await loadWorkStages(); await loadProjects(); setupFilters(); setupTabs(); setupTabsScroll(); setupModals(); }
            async function loadUser() { const { data } = await supabase.from('users').select('*').eq('telegram_id', userId).single(); if (data) { currentUser = data; currentRole = data.role; } document.getElementById('role-badge').textContent = currentRole === 'manager' ? 'Руководитель' : currentRole === 'worker' ? 'ИТР' : 'Монтажник'; }
            async function loadBrigades() { const { data } = await supabase.from('brigades').select('*').order('name'); allBrigades = data || []; }
            async function loadWorkStages() { const { data } = await supabase.from('work_stages').select('*').order('id'); allWorkStages = data || []; }
            async function loadProjects() { let query = supabase.from('projects').select('*, users!projects_responsible_worker_id_fkey(full_name)').order('created_at', { ascending: false }); if (currentRole === 'worker') query = query.eq('responsible_worker_id', currentUser?.id); const { data } = await query; allProjects = data || []; renderProjects(); }

            function renderProjects() {
                let filtered = allProjects;
                if (currentFilter === 'my') filtered = allProjects.filter(function(p) { return p.responsible_worker_id === currentUser?.id; });
                else if (currentFilter !== 'all') filtered = allProjects.filter(function(p) { return p.status === currentFilter; });
                const container = document.getElementById('objects-container');
                if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">🏗️ Нет объектов</div>'; return; }
                let html = '<div class="objects-grid">';
                filtered.forEach(function(p) { const st = { 'preparation': '📋 Подготовка', 'mobilization': '🚚 Мобилизация', 'in_progress': '🔨 В работе', 'completed': '✅ Завершён' }[p.status] || p.status;
                    html += '<div class="object-card" data-id="'+p.id+'"><div class="object-header"><span class="object-name">'+p.name+'</span><span class="object-status status-'+p.status+'">'+st+'</span></div><div class="object-address">📍 '+p.address+'</div><div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div></div><div class="object-footer"><div>👤 '+(p.users?.full_name || '—')+'</div><div>📅 '+window.formatDateShort(p.start_date)+'</div></div></div>'; });
                container.innerHTML = html + '</div>';
                container.querySelectorAll('.object-card').forEach(function(c) { c.addEventListener('click', function() { showDetail(c.dataset.id); }); });
            }

            function setupFilters() { document.querySelectorAll('.filter-btn').forEach(function(btn) { btn.addEventListener('click', function() { document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); }); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderProjects(); }); }); }
            function setupTabs() { document.querySelectorAll('.tab').forEach(function(t) { t.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); }); document.querySelectorAll('.tab-content').forEach(function(x) { x.classList.remove('active'); }); t.classList.add('active'); document.getElementById('tab-'+t.dataset.tab).classList.add('active'); if (t.dataset.tab === 'progress') loadProgressTab(); if (t.dataset.tab === 'history') loadHistoryTab(); if (t.dataset.tab === 'materials') loadMaterialsTab(); }); }); }
            function setupTabsScroll() { const tabsContainer = document.getElementById('tabs-container'); const scrollLeft = document.getElementById('scroll-left'); const scrollRight = document.getElementById('scroll-right'); if (!tabsContainer) return; function updateArrows() { if (scrollLeft) scrollLeft.classList.toggle('hidden', tabsContainer.scrollLeft <= 0); if (scrollRight) scrollRight.classList.toggle('hidden', tabsContainer.scrollLeft >= tabsContainer.scrollWidth - tabsContainer.clientWidth - 1); } if (scrollLeft) scrollLeft.addEventListener('click', function() { tabsContainer.scrollBy({ left: -200, behavior: 'smooth' }); }); if (scrollRight) scrollRight.addEventListener('click', function() { tabsContainer.scrollBy({ left: 200, behavior: 'smooth' }); }); tabsContainer.addEventListener('scroll', updateArrows); window.addEventListener('resize', updateArrows); setTimeout(updateArrows, 300); setTimeout(updateArrows, 600); }
            function setupModals() { document.getElementById('close-form-modal').onclick = function() { document.getElementById('form-modal').classList.add('hidden'); }; document.getElementById('close-edit-modal').onclick = function() { document.getElementById('edit-modal').classList.add('hidden'); }; document.getElementById('action-overlay').onclick = closeActionMenu; }

            async function showDetail(id) {
                currentProjectId = id;
                const { data: p } = await supabase.from('projects').select('*, users(full_name)').eq('id', id).single(); if (!p) return;
                document.getElementById('detail-name').textContent = p.name;
                document.getElementById('detail-status-badge').textContent = { 'preparation':'📋 Подготовка','mobilization':'🚚 Мобилизация','in_progress':'🔨 В работе','completed':'✅ Завершён' }[p.status]||p.status;
                document.getElementById('detail-content').innerHTML = 
                    '<p style="margin-bottom:8px"><strong>📍 Адрес:</strong> '+p.address+' <button class="btn-small btn-edit" onclick="window.openEditField(\'address\',\''+escapeHtml(p.address)+'\')">✏️</button></p>'+
                    '<p style="margin-bottom:8px"><strong>💰 Цена договора:</strong> '+(p.contract_price?.toLocaleString()||0)+' ₸ <button class="btn-small btn-edit" onclick="window.openEditField(\'contract_price\',\''+(p.contract_price||0)+'\')">✏️</button></p>'+
                    '<p style="margin-bottom:8px"><strong>📐 Проектная площадь:</strong> '+(p.project_area||0)+' м² <button class="btn-small btn-edit" onclick="window.openEditField(\'project_area\',\''+(p.project_area||0)+'\')">✏️</button></p>'+
                    '<p style="margin-bottom:8px"><strong>📅 Начало:</strong> '+window.formatDate(p.start_date)+' <button class="btn-small btn-edit" onclick="window.openEditField(\'start_date\',\''+(p.start_date||'')+'\')">✏️</button></p>'+
                    '<p style="margin-bottom:8px"><strong>🏁 Окончание:</strong> '+window.formatDate(p.end_date_contract)+' <button class="btn-small btn-edit" onclick="window.openEditField(\'end_date_contract\',\''+(p.end_date_contract||'')+'\')">✏️</button></p>'+
                    '<p style="margin-bottom:8px"><strong>👤 ИТР:</strong> '+(p.users?.full_name||'—')+'</p>'+
                    '<p style="margin-bottom:8px"><strong>📋 Менеджер:</strong> '+(p.manager_name||'—')+' · '+(p.manager_phone||'—')+' <button class="btn-small btn-edit" onclick="window.openEditManager()">✏️</button></p>'+

            function openEditMaterialForm(id, name, unit, qty) {
                var html = '<div class="form-group"><label>Наименование</label><input type="text" id="edit-mat-name" value="'+name+'"></div>';
                html += '<div class="row-2"><div class="form-group"><label>Ед. измерения</label><select id="edit-mat-unit"><option value="м²" '+(unit==='м²'?'selected':'')+'>м²</option><option value="шт" '+(unit==='шт'?'selected':'')+'>шт</option><option value="пог.м" '+(unit==='пог.м'?'selected':'')+'>пог.м</option><option value="рулон" '+(unit==='рулон'?'selected':'')+'>рулон</option><option value="упак" '+(unit==='упак'?'selected':'')+'>упаковка</option><option value="кг" '+(unit==='кг'?'selected':'')+'>кг</option></select></div><div class="form-group"><label>Общее количество</label><input type="number" id="edit-mat-qty" value="'+qty+'" step="0.01"></div></div>';
                html += '<div class="form-group"><label>📎 Новая накладная поставщика</label><input type="file" id="edit-mat-invoice" accept=".pdf,.jpg,.jpeg,.png"></div>';
                document.getElementById('form-modal-title').textContent = '✏️ Редактировать материал';
                document.getElementById('form-modal-content').innerHTML = html;
                document.getElementById('form-modal').classList.remove('hidden');
                var saveBtn = document.createElement('button'); saveBtn.className = 'btn-primary'; saveBtn.textContent = 'Сохранить';
                saveBtn.addEventListener('click', async function() {
                    var newName = document.getElementById('edit-mat-name').value.trim(); var newUnit = document.getElementById('edit-mat-unit').value; var newQty = parseFloat(document.getElementById('edit-mat-qty').value) || 0;
                    if (!newName || newQty <= 0) { alert('Заполните все поля'); return; }
                    var updateData = { name: newName, unit: newUnit, total_quantity: newQty, available_quantity: newQty };
                    var fileInput = document.getElementById('edit-mat-invoice');
                    if (fileInput && fileInput.files[0]) { var file = fileInput.files[0]; var fileName = 'materials/'+currentProjectId+'/'+Date.now()+'_'+file.name; var { error } = await supabase.storage.from('reports').upload(fileName, file); if (!error) { var { data: urlData } = supabase.storage.from('reports').getPublicUrl(fileName); updateData.supplier_invoice_url = urlData.publicUrl; updateData.supplier_invoice_name = file.name; } }
                    await supabase.from('material_catalog').update(updateData).eq('id', id);
                    document.getElementById('form-modal').classList.add('hidden'); loadMaterialsTab(); alert('✅ Материал обновлён');
                });
                document.getElementById('form-modal-content').appendChild(saveBtn);
            }

            async function deleteMaterial(id, name) { if (!confirm('⚠️ Удалить материал «'+name+'»?')) return; await supabase.from('material_catalog').delete().eq('id', id); loadMaterialsTab(); alert('✅ Материал удалён'); }

            function openIssueMaterialForm() {
                supabase.from('material_catalog').select('*').eq('project_id', currentProjectId).order('name').then(function(res) {
                    var materials = res.data || [];
                    if (!materials.length) { alert('Нет материалов для выдачи'); return; }
                    var html = '<div class="form-group"><label>Бригада *</label><select id="issue-brigade">'+allBrigades.map(function(b){return '<option value="'+b.id+'">'+b.name+' ('+(b.foreman_name||'')+')</option>';}).join('')+'</select></div>';
                    html += '<div class="form-group"><label>Ось / Подось *</label><input type="text" id="issue-axis" placeholder="1-5"></div>';
                    html += '<div class="form-group"><label>📋 Материалы для выдачи</label>';
                    materials.forEach(function(m) {
                        html += '<div style="display:flex;align-items:center;gap:8px;margin:8px 0;padding:8px;background:#F8FAFC;border-radius:10px">';
                        html += '<input type="checkbox" class="issue-mat-check" data-id="'+m.id+'" data-name="'+m.name+'" data-unit="'+m.unit+'" data-avail="'+m.available_quantity+'" style="width:20px;height:20px">';
                        html += '<span style="flex:1;font-size:13px">'+m.name+'<br><small>Доступно: '+m.available_quantity+' '+m.unit+'</small></span>';
                        html += '<input type="number" class="issue-mat-qty" placeholder="0" style="width:80px;padding:8px" step="0.01" disabled><span style="font-size:12px">'+m.unit+'</span></div>';
                    });
                    html += '</div>';
                    document.getElementById('form-modal-title').textContent = '📤 Выдать материал';
                    document.getElementById('form-modal-content').innerHTML = html;
                    document.getElementById('form-modal').classList.remove('hidden');
                    document.querySelectorAll('.issue-mat-check').forEach(function(cb) { cb.addEventListener('change', function() { var qtyInput = cb.parentElement.querySelector('.issue-mat-qty'); qtyInput.disabled = !cb.checked; if (!cb.checked) qtyInput.value = ''; }); });
                    var saveBtn = document.createElement('button'); saveBtn.className = 'btn-primary'; saveBtn.textContent = 'Выдать';
                    saveBtn.addEventListener('click', async function() {
                        var brigadeId = document.getElementById('issue-brigade').value; var axisName = document.getElementById('issue-axis').value.trim();
                        if (!axisName) { alert('Укажите ось/подось'); return; }
                        var items = [];
                        document.querySelectorAll('.issue-mat-check:checked').forEach(function(cb) { var qty = parseFloat(cb.parentElement.querySelector('.issue-mat-qty').value) || 0; if (qty > 0 && qty <= parseFloat(cb.dataset.avail)) { items.push({ material_id: cb.dataset.id, material_name: cb.dataset.name, unit: cb.dataset.unit, quantity: qty }); } });
                        if (!items.length) { alert('Выберите материалы и укажите количество'); return; }
                        var { data: waybill } = await supabase.from('material_waybills').insert({ project_id: currentProjectId, brigade_id: brigadeId, sub_axis_name: axisName, issued_by: currentUser?.id, issued_by_name: currentUser?.full_name }).select('id').single();
                        for (var i = 0; i < items.length; i++) { await supabase.from('material_waybill_items').insert({ waybill_id: waybill.id, ...items[i] }); var { data: mat } = await supabase.from('material_catalog').select('available_quantity').eq('id', items[i].material_id).single(); if (mat) { await supabase.from('material_catalog').update({ available_quantity: mat.available_quantity - items[i].quantity }).eq('id', items[i].material_id); } }
                        var { data: updatedWaybill } = await supabase.from('material_waybills').select('*').eq('id', waybill.id).single();
                        if (updatedWaybill) { var waybillNumber = 'НК-'+new Date().getFullYear().toString().slice(-2)+'-'+String(waybill.id).slice(-4); await supabase.from('material_waybills').update({ waybill_number: waybillNumber }).eq('id', waybill.id); }
                        document.getElementById('form-modal').classList.add('hidden'); loadMaterialsTab(); alert('✅ Материалы выданы. Накладная создана.');
                    });
                    document.getElementById('form-modal-content').appendChild(saveBtn);
                });
            }

            async function viewWaybill(waybillId) {
                var { data: waybill } = await supabase.from('material_waybills').select('*, material_waybill_items(*), brigades(name), projects(name)').eq('id', waybillId).single();
                if (!waybill) return;
                var items = waybill.material_waybill_items || [];
                var html = '<div style="font-family:Times New Roman,serif;padding:20px;border:1px solid #000"><h3 style="text-align:center">ООО «LamGroup Construction»</h3><h4 style="text-align:center">НАКЛАДНАЯ НА ВЫДАЧУ МАТЕРИАЛОВ</h4><p style="text-align:center"><strong>'+waybill.waybill_number+'</strong> от '+new Date(waybill.waybill_date).toLocaleDateString('ru-RU')+'</p><p><strong>Объект:</strong> '+(waybill.projects?.name||'—')+'</p><p><strong>Бригада:</strong> '+(waybill.brigades?.name||'—')+'</p><p><strong>Ось / Подось:</strong> '+(waybill.sub_axis_name||'—')+'</p>';
                html += '<table style="width:100%;border-collapse:collapse;margin:10px 0"><tr style="border:1px solid #000"><th style="padding:6px">№</th><th style="padding:6px">Наименование</th><th style="padding:6px">Ед.изм</th><th style="padding:6px">Кол-во</th></tr>';
                items.forEach(function(item, idx) { html += '<tr style="border:1px solid #000"><td style="padding:6px">'+(idx+1)+'</td><td style="padding:6px">'+item.material_name+'</td><td style="padding:6px">'+item.unit+'</td><td style="padding:6px">'+item.quantity+'</td></tr>'; });
                html += '</table><p style="margin-top:30px"><strong>Выдал:</strong> '+(waybill.issued_by_name||'—')+' ___________________</p><p><strong>Получил:</strong> ___________________</p></div>';
                var materialIds = items.map(function(i) { return i.material_id; });
                if (materialIds.length > 0) {
                    var { data: materialsWithInvoices } = await supabase.from('material_catalog').select('supplier_invoice_url,supplier_invoice_name').in('id', materialIds);
                    var invoices = (materialsWithInvoices || []).filter(function(m) { return m.supplier_invoice_url; });
                    if (invoices.length > 0) { html += '<div style="margin-top:20px"><h4>📎 Накладные поставщиков:</h4>'; invoices.forEach(function(inv) { html += '<p>📄 <a href="'+inv.supplier_invoice_url+'" target="_blank" style="color:#1E40AF;text-decoration:underline">'+inv.supplier_invoice_name+'</a></p>'; }); html += '</div>'; }
                }
                document.getElementById('form-modal-title').textContent = '📄 Накладная '+waybill.waybill_number;
                document.getElementById('form-modal-content').innerHTML = html;
                document.getElementById('form-modal').classList.remove('hidden');
            }

            function printWaybill(waybillId) {
                viewWaybill(waybillId).then(function() {
                    setTimeout(function() {
                        var content = document.getElementById('form-modal-content').innerHTML;
                        var printWindow = window.open('', '_blank', 'width=800,height=600');
                        printWindow.document.write('<html><head><meta charset="UTF-8"><title>Накладная</title><style>body{font-family:"Times New Roman",serif;padding:30px;max-width:800px;margin:0 auto}table{border-collapse:collapse;width:100%}td,th{border:1px solid #000;padding:6px}h3,h4{text-align:center}</style></head><body>'+content+'</body></html>');
                        printWindow.document.close();
                        setTimeout(function() { printWindow.print(); }, 500);
                    }, 300);
                });
            }

            init();
        })();
    </script>
</body>
</html>

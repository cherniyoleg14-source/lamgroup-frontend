<html lang="ru">
<head>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #F8FAFC; padding: 16px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .app-header h1 { font-size: 24px; font-weight: 800; color: #0F172A; letter-spacing: -0.5px; }
        .logo-badge { background: linear-gradient(135deg, #F59E0B, #F97316); color: white; padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .role-badge { background: #E2E8F0; color: #0F172A; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; border: 1.5px solid #E2E8F0; background: white; color: #64748B; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #0F172A; color: white; border-color: #0F172A; }
        .objects-grid { display: flex; flex-direction: column; gap: 12px; }
        .object-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid #F1F5F9; }
        .object-card:active { transform: scale(0.99); }
        .object-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .object-name { font-size: 16px; font-weight: 700; color: #0F172A; }
        .object-status { padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .status-preparation { background: #FEF3C7; color: #92400E; } .status-mobilization { background: #DBEAFE; color: #1E40AF; } .status-in_progress { background: #D1FAE5; color: #065F46; } .status-completed { background: #E2E8F0; color: #475569; }
        .object-address { font-size: 13px; color: #64748B; margin-bottom: 8px; }
        .progress-section { margin: 12px 0; } .progress-bar { height: 6px; background: #F1F5F9; border-radius: 30px; overflow: hidden; } .progress-fill { height: 100%; background: linear-gradient(90deg, #0F172A, #F59E0B); border-radius: 30px; width: 0%; }
        .object-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #F1F5F9; font-size: 12px; color: #64748B; }
        .back-btn { background: none; border: none; color: #0F172A; font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 0; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .tabs-wrapper { position: relative; margin: 16px 0; }
        .tabs { display: flex; gap: 4px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 6px; border-bottom: 2px solid #E2E8F0; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 12px; background: none; border: none; font-weight: 600; color: #64748B; cursor: pointer; white-space: nowrap; font-size: 12px; border-bottom: 3px solid transparent; }
        .tab.active { color: #0F172A; border-bottom-color: #F59E0B; }
        .scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: white; border: 1px solid #E2E8F0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; font-size: 16px; font-weight: 700; color: #0F172A; }
        .scroll-arrow.left { left: -15px; } .scroll-arrow.right { right: -15px; } .scroll-arrow.hidden { display: none; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .info-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #F1F5F9; }
        .form-group { margin-bottom: 14px; } label { font-weight: 600; color: #475569; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 14px; font-size: 14px; background: white; font-family: 'Inter', sans-serif; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn-primary { width: 100%; background: linear-gradient(135deg, #0F172A, #1E293B); color: white; padding: 14px; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-secondary { background: #F8FAFC; color: #0F172A; padding: 8px 14px; border-radius: 12px; font-weight: 600; border: 1.5px solid #E2E8F0; cursor: pointer; font-size: 12px; }
        .btn-small { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
        .btn-edit { background: #FEF3C7; color: #92400E; } .btn-delete { background: #FEE2E2; color: #991B1B; } .btn-add { background: #DBEAFE; color: #1E40AF; }
        .btn-pdf { background: #F3E8FF; color: #6B21A8; padding: 6px 12px; border-radius: 10px; font-weight: 600; border: 1px solid #D8B4FE; cursor: pointer; font-size: 12px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; } .loading { text-align: center; padding: 40px 20px; color: #64748B; } .empty-state { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; color: #64748B; }
        .message { padding: 14px; border-radius: 14px; margin: 14px 0; display: none; font-weight: 500; font-size: 14px; } .message.success { background: #D1FAE5; color: #065F46; display: block; } .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .gpr-item { background: white; border-radius: 16px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #F1F5F9; }
        .axis-card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1.5px solid #E2E8F0; }
        .axis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; } .axis-name { font-weight: 700; color: #0F172A; font-size: 15px; }
        .axis-dates { font-size: 12px; color: #64748B; margin-bottom: 8px; }
        .brigade-section { background: #F8FAFC; border-radius: 14px; padding: 14px; margin: 10px 0; border: 1px solid #E2E8F0; }
        .brigade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; } .brigade-name { font-weight: 600; color: #0F172A; font-size: 14px; }
        .work-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 6px 0; } .work-table th { text-align: left; padding: 6px; background: #F1F5F9; color: #475569; font-weight: 600; font-size: 10px; } .work-table td { padding: 6px; border-bottom: 1px solid #F1F5F9; } .work-table .text-right { text-align: right; }
        .progress-input { width: 55px; padding: 5px 6px; border-radius: 8px; border: 1px solid #E2E8F0; text-align: center; font-size: 12px; }
        .status-badge-sm { padding: 3px 6px; border-radius: 20px; font-size: 10px; font-weight: 600; } .status-in_progress-sm { background: #D1FAE5; color: #065F46; } .status-pending-sm { background: #FEF3C7; color: #92400E; } .status-completed-sm { background: #E2E8F0; color: #475569; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10002; } .modal.hidden { display: none !important; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; } .modal-title { font-size: 20px; font-weight: 800; color: #0F172A; } .close-btn { background: #F1F5F9; border: none; width: 36px; height: 36px; border-radius: 36px; font-size: 18px; cursor: pointer; color: #64748B; display: flex; align-items: center; justify-content: center; }
        .action-menu-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 16px; z-index: 10003; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 10002; } .action-item { padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .fullscreen-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F8FAFC; z-index: 10001; overflow-y: auto; padding: 16px; }
        .checklist-progress-container { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .checklist-stat-card { flex: 1; background: #F8FAFC; border-radius: 20px; padding: 16px; text-align: center; } .checklist-stat-value { font-size: 28px; font-weight: 800; color: #0F172A; } .checklist-stat-label { font-size: 12px; color: #64748B; }
        .checklist-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #F1F5F9; } .checklist-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: #F59E0B; cursor: pointer; } .checklist-item label { flex: 1; font-size: 14px; cursor: pointer; text-transform: none; }
        .filter-chip { padding: 6px 12px; border-radius: 30px; font-size: 12px; border: 1px solid #E2E8F0; background: white; cursor: pointer; } .filter-chip.active { background: #0F172A; color: white; border-color: #0F172A; }
    </style>
</head>
<body>
    <div class="container">
        <div id="list-view">
            <div class="app-header"><h1>LamGroup <span class="logo-badge">Construction</span></h1><span class="role-badge" id="role-badge"></span></div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="my">Мои</button>
                <button class="filter-btn" data-filter="preparation">Подготовка</button><button class="filter-btn" data-filter="in_progress">В работе</button><button class="filter-btn" data-filter="completed">Завершён</button>
            </div>
            <div id="objects-container"><div class="loading">Загрузка объектов...</div></div>
        </div>
        <div id="detail-view" class="hidden">
            <button class="back-btn" id="back-btn">← Назад</button>
            <div class="app-header"><h1 id="detail-name"></h1><span class="role-badge" id="detail-status-badge"></span></div>
            <div class="tabs-wrapper">
                <div class="scroll-arrow left hidden" id="scroll-left">←</div>
                <div class="tabs" id="tabs-container">
                    <button class="tab active" data-tab="info">📋 Инфо</button>
                    <button class="tab" data-tab="progress">📊 Прогресс</button>
                    <button class="tab" data-tab="history">📜 История</button>
                    <button class="tab" data-tab="expenses">💰 Расходы</button>
                    <button class="tab" data-tab="materials">📦 Материалы</button>
                    <button class="tab" data-tab="checklist">✅ Чек-лист</button>
                    <button class="tab" data-tab="issues">⚠️ Проблемы</button>
                    <button class="tab" data-tab="report">📑 Отчет</button>
                </div>
                <div class="scroll-arrow right" id="scroll-right">→</div>
            </div>
            <div id="tab-info" class="tab-content active"><div class="info-card" id="detail-content"></div></div>
            <div id="tab-progress" class="tab-content"><div id="progress-container"></div></div>
            <div id="tab-history" class="tab-content"><div id="history-container"></div></div>
            <div id="tab-expenses" class="tab-content"></div>
            <div id="tab-materials" class="tab-content"><div id="materials-container"></div></div>
            <div id="tab-checklist" class="tab-content"></div>
            <div id="tab-issues" class="tab-content"></div>
            <div id="tab-report" class="tab-content"></div>
        </div>
        <div id="axis-detail-page" class="fullscreen-modal hidden"></div>
        <div id="action-overlay" class="action-overlay hidden"></div>
        <div id="action-menu" class="action-menu-modal hidden"></div>
        <div id="form-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="form-modal-title"></span><button class="close-btn" id="close-form-modal">&times;</button></div><div id="form-modal-content"></div></div></div>
        <div id="edit-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="edit-modal-title"></span><button class="close-btn" id="close-edit-modal">&times;</button></div><div id="edit-modal-content"></div><button class="btn-primary" id="save-edit-btn">Сохранить</button></div></div>
        <div id="message" class="message"></div>
    </div>

<script>
window.closeActionMenu=function(){var m=document.getElementById('action-menu');var o=document.getElementById('action-overlay');if(m)m.classList.add('hidden');if(o)o.classList.add('hidden');};
window.closeAxisDetailPage=function(){var p=document.getElementById('axis-detail-page');if(p)p.classList.add('hidden');if(window._loadProgressTab)window._loadProgressTab();};
window.formatDate=function(d){if(!d)return'—';return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});};
window.formatDateShort=function(d){if(!d)return'—';return new Date(d).toLocaleDateString('ru-RU');};

(function(){
const tg=window.Telegram.WebApp;tg.expand();tg.ready();
const SUPABASE_URL='https://owagntywpiymqhbfoxye.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let userId=tg.initDataUnsafe?.user?.id;if(!userId){alert('Ошибка авторизации');return;}
let currentUser=null,currentRole='worker',currentProjectId=null,currentFilter='all',allProjects=[],allBrigades=[],allWorkStages=[],currentAxisId=null;

function showMessage(t,ty){var m=document.getElementById('message');m.textContent=t;m.className='message '+ty;setTimeout(function(){m.className='message';},3000);}
function escapeHtml(t){if(!t)return'';return String(t).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c;});}

async function init(){await loadUser();await loadBrigades();await loadWorkStages();await loadProjects();setupFilters();setupTabs();setupTabsScroll();setupModals();}
async function loadUser(){var{data}=await supabase.from('users').select('*').eq('telegram_id',userId).single();if(data){currentUser=data;currentRole=data.role;}document.getElementById('role-badge').textContent=currentRole==='manager'?'Руководитель':currentRole==='worker'?'ИТР':'Монтажник';}
async function loadBrigades(){var{data}=await supabase.from('brigades').select('*').order('name');allBrigades=data||[];}
async function loadWorkStages(){var{data}=await supabase.from('work_stages').select('*').order('id');allWorkStages=data||[];}
async function loadProjects(){var query=supabase.from('projects').select('*, users!projects_responsible_worker_id_fkey(full_name)').order('created_at',{ascending:false});if(currentRole==='worker')query=query.eq('responsible_worker_id',currentUser?.id);var{data}=await query;allProjects=data||[];renderProjects();}

function renderProjects(){
var f=allProjects;
if(currentFilter==='my')f=allProjects.filter(function(p){return p.responsible_worker_id===currentUser?.id;});
else if(currentFilter!=='all')f=allProjects.filter(function(p){return p.status===currentFilter;});
var c=document.getElementById('objects-container');
if(!f.length){c.innerHTML='<div class="empty-state">🏗️ Нет объектов</div>';return;}
var h='<div class="objects-grid">';
f.forEach(function(p){var s={'preparation':'📋 Подготовка','mobilization':'🚚 Мобилизация','in_progress':'🔨 В работе','completed':'✅ Завершён'}[p.status]||p.status;
h+='<div class="object-card" data-id="'+p.id+'"><div class="object-header"><span class="object-name">'+p.name+'</span><span class="object-status status-'+p.status+'">'+s+'</span></div><div class="object-address">📍 '+p.address+'</div><div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div></div><div class="object-footer"><div>👤 '+(p.users?.full_name||'—')+'</div><div>📅 Старт: '+window.formatDateShort(p.start_date)+'</div><div>🏁 ГПР: '+window.formatDateShort(p.end_date_contract)+'</div></div></div>';});
c.innerHTML=h+'</div>';
c.querySelectorAll('.object-card').forEach(function(x){x.addEventListener('click',function(){showDetail(x.dataset.id);});});
}

function setupFilters(){document.querySelectorAll('.filter-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');currentFilter=b.dataset.filter;renderProjects();});});}
function setupTabs(){document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active');
if(t.dataset.tab==='progress')loadProgressTab();if(t.dataset.tab==='history')loadHistoryTab();if(t.dataset.tab==='materials')loadMaterialsTab();if(t.dataset.tab==='checklist')loadChecklist();if(t.dataset.tab==='expenses')loadExpenses();if(t.dataset.tab==='issues')loadIssues();if(t.dataset.tab==='report')loadReports();});});}
function setupTabsScroll(){var tc=document.getElementById('tabs-container');var sl=document.getElementById('scroll-left');var sr=document.getElementById('scroll-right');if(!tc)return;function ua(){if(sl)sl.classList.toggle('hidden',tc.scrollLeft<=0);if(sr)sr.classList.toggle('hidden',tc.scrollLeft>=tc.scrollWidth-tc.clientWidth-1);}if(sl)sl.addEventListener('click',function(){tc.scrollBy({left:-200,behavior:'smooth'});});if(sr)sr.addEventListener('click',function(){tc.scrollBy({left:200,behavior:'smooth'});});tc.addEventListener('scroll',ua);window.addEventListener('resize',ua);setTimeout(ua,300);}
function setupModals(){document.getElementById('close-form-modal').onclick=function(){document.getElementById('form-modal').classList.add('hidden');};document.getElementById('close-edit-modal').onclick=function(){document.getElementById('edit-modal').classList.add('hidden');};document.getElementById('action-overlay').onclick=closeActionMenu;}

async function showDetail(id){
currentProjectId=id;
var{data:p}=await supabase.from('projects').select('*, users(full_name)').eq('id',id).single();if(!p)return;
document.getElementById('detail-name').textContent=p.name;
document.getElementById('detail-status-badge').textContent={'preparation':'📋 Подготовка','mobilization':'🚚 Мобилизация','in_progress':'🔨 В работе','completed':'✅ Завершён'}[p.status]||p.status;
document.getElementById('detail-content').innerHTML=
'<p style="margin-bottom:8px"><strong>📍 Адрес:</strong> '+p.address+' <button class="btn-small btn-edit" onclick="window.openEditField(\'address\',\''+escapeHtml(p.address)+'\')">✏️</button></p>'+
'<p style="margin-bottom:8px"><strong>💰 Цена договора:</strong> '+(p.contract_price?.toLocaleString()||0)+' ₸ <button class="btn-small btn-edit" onclick="window.openEditField(\'contract_price\',\''+(p.contract_price||0)+'\')">✏️</button></p>'+
'<p style="margin-bottom:8px"><strong>📐 Проектная площадь:</strong> '+(p.project_area||0)+' м² <button class="btn-small btn-edit" onclick="window.openEditField(\'project_area\',\''+(p.project_area||0)+'\')">✏️</button></p>'+
'<p style="margin-bottom:8px"><strong>📅 Начало:</strong> '+window.formatDate(p.start_date)+' <button class="btn-small btn-edit" onclick="window.openEditField(\'start_date\',\''+(p.start_date||'')+'\')">✏️</button></p>'+
'<p style="margin-bottom:8px"><strong>🏁 Окончание:</strong> '+window.formatDate(p.end_date_contract)+' <button class="btn-small btn-edit" onclick="window.openEditField(\'end_date_contract\',\''+(p.end_date_contract||'')+'\')">✏️</button></p>'+

window.openWorkOrderForm = async function(axId, brId) {

    var { data: adv } = await supabase.from('advances').select('*').eq('brigade_id', brId);

    }

            brigade_id: brId,
            work_type: 'Работы (100%)',
            volume: tv,
            total_amount: fp,
            original_amount: tc,
            guarantee_amount: gr,
            total_paid: tpd,
            created_by: currentUser?.id,
            status: 'pending',
            payment_method: pm,
            is_urgent: iu,
            order_number: on

        await supabase.from('document_numbers').insert({ doc_type: 'naryad', number: nn });
        alert('✅ Наряд создан! Итоговая сумма к оплате: ' + fp.toLocaleString() + ' ₸');

stages.forEach(function(s){window.addStageRow(sc);var r=sc.lastElementChild;r.querySelector('.stage-select').value=s.stage_id||'';r.querySelector('.stage-volume').value=s.volume||'';r.querySelector('.stage-price').value=s.price_per_unit||'';r.querySelector('.stage-start').value=s.plan_start?s.plan_start.split('T')[0]:'';r.querySelector('.stage-end').value=s.plan_end?s.plan_end.split('T')[0]:'';});
document.getElementById('add-edit-stage-btn').addEventListener('click',function(){window.addStageRow(sc);});
var sb=document.createElement('button');sb.className='btn btn-primary';sb.textContent='💾 Сохранить';sb.style.marginTop='16px';

window.getNextLetterNumber=async function(){var{data,error}=await supabase.rpc('next_letter_number');if(error||!data){var{data:ll}=await supabase.from('letters').select('letter_number_full').order('created_at',{ascending:false}).limit(1);if(ll&&ll.length&&ll[0].letter_number_full){var ln=parseInt(ll[0].letter_number_full.replace('-Р',''));return(ln+1)+'-Р';}return'1-Р';}return data+'-Р';};

// ========== ЧЕК-ЛИСТ ==========
async function loadChecklist(){
var c=document.getElementById('tab-checklist');c.innerHTML='<div class="loading">Загрузка чек-листа...</div>';
var{data,error}=await supabase.from('checklists').select('*').or('project_id.is.null,project_id.eq.'+currentProjectId).order('sort_order',{ascending:true});
if(error){c.innerHTML='<div class="info-card"><p class="error">Ошибка: '+error.message+'</p></div>';return;}
var items=data||[];var comp=items.filter(function(i){return i.is_completed===true;}).length;var total=items.length;var pct=total>0?Math.round((comp/total)*100):0;
var ci=items.filter(function(i){return i.section==='foreman_customer';});var wi=items.filter(function(i){return i.section==='foreman_workers';});
var h='<div class="info-card"><div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;"><div style="flex:1;background:#F8FAFC;border-radius:20px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:800;color:#0F172A;">'+comp+'/'+total+'</div><div style="font-size:12px;color:#64748B;">Выполнено</div></div><div style="flex:1;background:#F8FAFC;border-radius:20px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:800;color:#0F172A;">'+pct+'%</div><div style="font-size:12px;color:#64748B;">Прогресс</div></div></div><div style="height:8px;background:#E2E8F0;border-radius:40px;overflow:hidden;margin-bottom:24px;"><div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,#0F172A,#F59E0B);"></div></div><div style="margin-bottom:28px;"><h4 style="margin-bottom:16px;font-size:16px;color:#0F172A;">📋 Взаимодействие с Заказчиком</h4>';
if(!ci.length){h+='<p style="color:#94A3B8;">Нет пунктов</p>';}else{ci.forEach(function(item){var ch=item.is_completed===true;h+='<div class="checklist-item"><input type="checkbox" class="checklist-cb" data-id="'+item.id+'" '+(ch?'checked':'')+'><label style="flex:1;font-size:14px;'+(ch?'text-decoration:line-through;color:#94A3B8;':'color:#334155;')+'cursor:pointer;">'+escapeHtml(item.item_text)+'</label></div>';});}
h+='</div><div style="margin-bottom:28px;"><h4 style="margin-bottom:16px;">👷 Взаимодействие с Монтажниками</h4>';
if(!wi.length){h+='<p style="color:#94A3B8;">Нет пунктов</p>';}else{wi.forEach(function(item){var ch=item.is_completed===true;h+='<div class="checklist-item"><input type="checkbox" class="checklist-cb" data-id="'+item.id+'" '+(ch?'checked':'')+'><label style="flex:1;font-size:14px;'+(ch?'text-decoration:line-through;color:#94A3B8;':'color:#334155;')+'cursor:pointer;">'+escapeHtml(item.item_text)+'</label></div>';});}
h+='</div></div>';c.innerHTML=h;
c.querySelectorAll('.checklist-cb').forEach(function(cb){cb.addEventListener('change',async function(){var id=cb.dataset.id;var ch=cb.checked;var lb=cb.nextElementSibling;if(ch){lb.style.textDecoration='line-through';lb.style.color='#94A3B8';}else{lb.style.textDecoration='none';lb.style.color='#334155';}var{error}=await supabase.from('checklists').update({is_completed:ch,project_id:currentProjectId,completed_at:ch?new Date():null,completed_by:ch?currentUser?.id:null}).eq('id',id);if(error){showMessage('Ошибка: '+error.message,'error');cb.checked=!ch;}else{loadChecklist();showMessage(ch?'✅ Пункт отмечен':'◻️ Галочка снята','success');}});});
}

// ========== РАСХОДЫ ==========
async function loadExpenses(){
var c=document.getElementById('tab-expenses');c.innerHTML='<div class="loading">Загрузка расходов...</div>';
var{data,error}=await supabase.from('expenses').select('*').eq('project_id',currentProjectId).order('date',{ascending:false});
if(error){c.innerHTML='<div class="info-card"><p class="error">Ошибка: '+error.message+'</p></div>';return;}
var ex=data||[];var at=ex.filter(function(e){return e.payment_status==='approved';}).reduce(function(s,e){return s+Number(e.amount);},0);
var pt=ex.filter(function(e){return e.payment_status==='pending';}).reduce(function(s,e){return s+Number(e.amount);},0);
var cm={delivery:'🚛 Доставка',consumables:'🔧 Расходники',cradles:'🏗️ Люльки',scaffolding:'🪜 Леса',rent:'🏢 Аренда',other:'📄 Прочее'};
var h='<div class="info-card"><div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;"><div style="flex:1;background:#D1FAE5;border-radius:20px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:800;color:#065F46;">'+at.toLocaleString()+' ₸</div><div style="font-size:12px;color:#065F46;">✅ Утверждено</div></div><div style="flex:1;background:#FEF3C7;border-radius:20px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:800;color:#92400E;">'+pt.toLocaleString()+' ₸</div><div style="font-size:12px;color:#92400E;">⏳ Ожидают</div></div></div><button class="btn-primary" id="add-expense-btn" style="margin-bottom:20px;">➕ Добавить расход</button>';
if(!ex.length){h+='<p style="color:#64748B;text-align:center;padding:20px;">Нет расходов</p>';}else{
ex.forEach(function(e){var ia=e.payment_status==='approved';var iu=e.is_urgent===true;var bc=iu?'#EF4444':(ia?'#10B981':'#F59E0B');
h+='<div class="gpr-item" style="border-left:4px solid '+bc+';margin-bottom:12px;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><div><strong>'+escapeHtml(e.name)+'</strong>'+(iu?'<span style="background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:20px;font-size:10px;margin-left:8px;">🚨 СРОЧНО</span>':'')+'<br><span style="font-size:11px;color:#64748B;">'+(cm[e.category]||e.category)+'</span></div><div style="font-size:18px;font-weight:700;color:'+(ia?'#065F46':'#92400E')+';">'+Number(e.amount).toLocaleString()+' ₸</div></div>';
h+='<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#64748B;"><span>📅 '+(e.date?new Date(e.date).toLocaleDateString('ru-RU'):'—')+'</span><span>💳 '+(e.payment_method==='cash'?'Наличка':e.payment_method==='non_cash'?'Безнал':(e.payment_type==='cash'?'Наличка':'Безнал'))+'</span></div>';
if(e.supplier)h+='<div style="font-size:12px;margin-top:6px;">🏢 '+escapeHtml(e.supplier)+'</div>';
if(!ia&&currentRole==='manager'){h+='<button class="btn-small" style="margin-top:10px;background:#DBEAFE;color:#1E40AF;padding:6px 12px;border-radius:10px;border:none;cursor:pointer;" onclick="approveExpense(\''+e.id+'\')">✅ Утвердить</button>';}
h+='</div>';
});}
h+='</div>';c.innerHTML=h;
document.getElementById('add-expense-btn')?.addEventListener('click',openAddExpenseForm);
}

function openAddExpenseForm(){
var today=new Date().toISOString().split('T')[0];
supabase.from('document_numbers').select('number').eq('doc_type','expense').order('number',{ascending:false}).limit(1).then(function(result){
var nn=(result.data&&result.data.length)?result.data[0].number+1:1;var en='№-RAS-'+nn+' от '+new Date().toLocaleDateString('ru-RU');
var mh='<div class="form-group"><label class="form-label">📄 Номер расхода</label><input value="'+en+'" disabled class="form-input"></div>';
mh+='<div class="form-group"><label>Дата расхода *</label><input type="date" id="expense-date" class="form-input" value="'+today+'"></div>';
mh+='<div class="form-group"><label>Статья расхода *</label><select id="expense-category" class="form-input"><option value="delivery">🚛 Доставка</option><option value="consumables">🔧 Расходники</option><option value="cradles">🏗️ Люльки</option><option value="scaffolding">🪜 Леса</option><option value="rent">🏢 Аренда</option><option value="other">📄 Прочее</option></select></div>';
mh+='<div class="form-group"><label>Наименование расхода *</label><input type="text" id="expense-name" class="form-input" placeholder="Например: Доставка материалов"></div>';
mh+='<div class="form-group"><label>Поставщик / Получатель</label><input type="text" id="expense-supplier" class="form-input" placeholder="ТОО «СтройМатериалы»"></div>';
mh+='<div class="row-2"><div class="form-group"><label>Количество</label><input type="number" id="expense-quantity" class="form-input" step="0.01" value="1"></div><div class="form-group"><label>Сумма *</label><input type="number" id="expense-amount" class="form-input" step="0.01" placeholder="Сумма в ₸"></div></div>';
mh+='<div class="form-group"><label class="form-label">Метод оплаты *</label><select id="expense-payment-method" class="form-input" onchange="toggleExpenseFields()"><option value="non_cash">💳 Безнал</option><option value="cash">💵 Наличка</option></select></div>';
mh+='<div class="form-group"><label>📎 Счёт на оплату</label><input type="file" id="expense-invoice" class="form-input" accept=".pdf,.jpg,.jpeg,.png"></div>';
mh+='<div class="checkbox-row" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><input type="checkbox" id="expense-urgent" style="width:20px;height:20px;"><label style="font-size:14px;">🚨 Срочный платёж</label></div>';
mh+='<div class="form-group"><label class="form-label">Статус *</label><select id="expense-status" class="form-input" onchange="toggleExpenseFields()"><option value="paid">✅ Оплатили</option><option value="pending">⏳ В план оплат</option></select></div>';
mh+='<div id="expense-paid-by-group" class="form-group" style="display:none;"><label class="form-label">👤 Кто оплатил</label><select id="expense-paid-by" class="form-input"></select></div>';
mh+='<div id="expense-plan-date-group" class="form-group" style="display:none;"><label class="form-label">📅 Дата платежа</label><input type="date" id="expense-plan-date" class="form-input" value="'+today+'"></div>';
mh+='<button class="btn-primary" id="save-expense-btn">💾 Сохранить расход</button>';
document.getElementById('form-modal-title').textContent='➕ Добавить расход';
document.getElementById('form-modal-content').innerHTML=mh;document.getElementById('form-modal').classList.remove('hidden');
supabase.from('users').select('id, full_name').in('role',['manager','worker']).order('full_name').then(function(ur){var sel=document.getElementById('expense-paid-by');if(sel&&ur.data){sel.innerHTML='<option value="">Выберите сотрудника</option>'+ur.data.map(function(u){return'<option value="'+u.id+'">'+u.full_name+'</option>';}).join('');}});
window.toggleExpenseFields=function(){var mt=document.getElementById('expense-payment-method').value;var st=document.getElementById('expense-status').value;document.getElementById('expense-paid-by-group').style.display=(mt==='cash'&&st==='paid')?'block':'none';document.getElementById('expense-plan-date-group').style.display=(st==='pending')?'block':'none';};
window._currentExpenseNumber=en;window._currentExpenseNextNum=nn;
});
setTimeout(function(){var sb=document.getElementById('save-expense-btn');if(sb&&!sb._hasListener){sb._hasListener=true;sb.onclick=async function(){
var dt=document.getElementById('expense-date').value;var ct=document.getElementById('expense-category').value;var nm=document.getElementById('expense-name').value.trim();var sp=document.getElementById('expense-supplier').value.trim();var qt=parseFloat(document.getElementById('expense-quantity').value)||1;var am=parseFloat(document.getElementById('expense-amount').value);var pm=document.getElementById('expense-payment-method').value;var iu=document.getElementById('expense-urgent').checked;var ps=document.getElementById('expense-status').value;var pbs=document.getElementById('expense-paid-by');var pbn=pbs?pbs.selectedOptions[0]?.text:null;var pd=ps==='pending'?document.getElementById('expense-plan-date').value:null;
if(!nm||!am||am<=0){alert('Заполните наименование и сумму');return;}
var iuUrl=null,iuName=null;var fi=document.getElementById('expense-invoice');if(fi&&fi.files[0]){var fl=fi.files[0];iuName=fl.name;var cn=fl.name.replace(/[^a-zA-Z0-9._-]/g,'_');var fn='invoices/'+Date.now()+'_'+cn;var{error:ue}=await supabase.storage.from('reports').upload(fn,fl);if(!ue){var{data:ud}=supabase.storage.from('reports').getPublicUrl(fn);iuUrl=ud.publicUrl;}}
var{error:ie}=await supabase.from('expenses').insert({project_id:currentProjectId,date:dt,name:nm,category:ct,quantity:qt,amount:am,payment_type:pm==='cash'?'cash':'invoice',payment_status:ps,supplier:sp||null,is_urgent:iu,payment_method:pm,invoice_url:iuUrl,invoice_name:iuName,created_by:currentUser?.id,expense_number:window._currentExpenseNumber,paid_by_name:pbn,planned_payment_date:pd});
if(ie){alert('Ошибка: '+ie.message);return;}
await supabase.from('document_numbers').insert({doc_type:'expense',number:window._currentExpenseNextNum});
if(ps==='pending'){await supabase.from('custom_tasks').insert({project_id:currentProjectId,title:(iu?'🚨 ':'')+'Расход '+window._currentExpenseNumber+': '+nm,description:'Сумма: '+am.toLocaleString()+' ₸\nПоставщик: '+(sp||'—')+'\nДата платежа: '+(pd||'—'),status:'pending',priority:iu?'high':'medium',type:'payment',created_by:currentUser?.id,created_by_name:currentUser?.full_name});}
document.getElementById('form-modal').classList.add('hidden');loadExpenses();showMessage('✅ Расход добавлен','success');
};}},300);
}

window.approveExpense=async function(id){var{error}=await supabase.from('expenses').update({payment_status:'approved',approved_at:new Date(),approved_by:currentUser?.id}).eq('id',id);if(error){showMessage('Ошибка: '+error.message,'error');}else{showMessage('✅ Расход утверждён','success');loadExpenses();}};

init();
})();
</script>

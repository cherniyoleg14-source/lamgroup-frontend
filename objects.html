<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Объекты | LamGroup</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="lamgroup-styles.css">
    <script src="supabase-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .object-card { cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .object-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--gold), var(--primary)); border-radius: 4px 0 0 4px; }
        .object-card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,0.1); }
        .object-card .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; margin-bottom: 16px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--card); color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .stat-mini { text-align: center; padding: 12px; }
        .stat-mini .value { font-size: 24px; font-weight: 800; }
        .stat-mini .label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .detail-section { animation: fadeIn 0.4s ease; }
        .axis-card-gpr { background: var(--card); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; border: 1px solid rgba(226,232,240,0.5); transition: all 0.2s; }
        .axis-card-gpr:hover { box-shadow: var(--shadow); }
        .gpr-stage-row { display: flex; align-items: center; gap: 10px; padding: 10px; background: #F8FAFC; border-radius: var(--radius); margin-bottom: 6px; flex-wrap: wrap; }
        .gpr-stage-row:hover { background: #F1F5F9; }
        .inline-edit { cursor: pointer; border-bottom: 1px dashed var(--border); padding: 2px 4px; transition: all 0.2s; }
        .inline-edit:hover { background: #FEF3C7; border-color: var(--gold); }
        .quick-action { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #F8FAFC; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .quick-action:hover { background: var(--card); border-color: var(--gold); }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
        .photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; }
        .photo-thumb:hover { transform: scale(1.05); box-shadow: var(--shadow); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главная страница -->
        <div id="main-view">
            <div class="app-header">
                <div>
                    <h1>🏗️ LamGroup</h1>
                    <span class="badge badge-gold" style="font-size:10px;padding:3px 8px;">Construction</span>
                </div>
                <span class="badge badge-primary" id="role-badge">Загрузка...</span>
            </div>
            <div class="filter-scroll">
                <button class="filter-chip active" data-filter="all">📋 Все</button>
                <button class="filter-chip" data-filter="my">👤 Мои</button>
                <button class="filter-chip" data-filter="preparation">📋 Подготовка</button>
                <button class="filter-chip" data-filter="in_progress">🔨 В работе</button>
                <button class="filter-chip" data-filter="completed">✅ Завершён</button>
            </div>
            <div id="objects-container"><div class="loading">Загрузка объектов...</div></div>
        </div>
        
        <!-- Детальная страница объекта -->
        <div id="detail-view" class="hidden">
            <button class="btn btn-outline btn-sm" id="back-btn" style="margin-bottom:12px;">← Назад к объектам</button>
            <div class="app-header">
                <h1 id="detail-name">Объект</h1>
                <span class="badge" id="detail-status-badge"></span>
            </div>
            <div class="tabs" id="tabs-container">
                <button class="tab active" data-tab="info">📋 Обзор</button>
                <button class="tab" data-tab="gpr">📊 ГПР</button>
                <button class="tab" data-tab="expenses">💰 Расходы</button>
                <button class="tab" data-tab="materials">📦 Материалы</button>
                <button class="tab" data-tab="checklist">✅ Чек-лист</button>
                <button class="tab" data-tab="issues">⚠️ Проблемы</button>
                <button class="tab" data-tab="reports">📑 Отчёты</button>
                <button class="tab" data-tab="history">📜 История</button>
            </div>
            <div id="tab-info" class="tab-content active"></div>
            <div id="tab-gpr" class="tab-content"></div>
            <div id="tab-expenses" class="tab-content"></div>
            <div id="tab-materials" class="tab-content"></div>
            <div id="tab-checklist" class="tab-content"></div>
            <div id="tab-issues" class="tab-content"></div>
            <div id="tab-reports" class="tab-content"></div>
            <div id="tab-history" class="tab-content"></div>
        </div>
        
        <!-- Модальное окно -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title" id="modal-title">Форма</span>
                    <button class="modal-close" id="modal-close">✕</button>
                </div>
                <div id="modal-content"></div>
            </div>
        </div>
        
        <!-- Глобальное сообщение -->
        <div id="global-message" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;padding:0;border-radius:14px;font-weight:600;font-size:14px;max-width:90%;text-align:center;transition:all 0.3s ease;opacity:0;pointer-events:none;"></div>
    </div>

    <script>
    (function() {
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Получение клиента Supabase
        const supabase = window.LamGroupDB.getClient();
        const { escapeHtml, formatDate, formatDateShort, formatMoney, showMessage, STATUS_MAP } = window.LamGroupDB;
        
        let userId = tg.initDataUnsafe?.user?.id;
        if (!userId) { alert('Ошибка авторизации Telegram'); return; }
        
        // Состояние приложения
        let currentUser = null;
        let currentRole = 'worker';
        let currentProjectId = null;
        let currentFilter = 'all';
        let allProjects = [];
        let allBrigades = [];
        let allWorkStages = [];
        
        // DOM элементы
        const mainView = document.getElementById('main-view');
        const detailView = document.getElementById('detail-view');
        const objectsContainer = document.getElementById('objects-container');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalContent = document.getElementById('modal-content');
        const modalClose = document.getElementById('modal-close');

        // Инициализация
        async function init() {
            await loadUser();
            await loadBrigades();
            await loadWorkStages();
            await loadProjects();
            setupFilters();
            setupTabs();
            setupModals();
        }

        // Загрузка пользователя
        async function loadUser() {
            const { data } = await supabase.from('users').select('*').eq('telegram_id', userId).single();
            if (data) {
                currentUser = data;
                currentRole = data.role;
            }
            document.getElementById('role-badge').textContent = 
                currentRole === 'manager' ? '👑 Руководитель' : 
                currentRole === 'worker' ? '👷 ИТР' : '🔧 Монтажник';
        }

        // Загрузка бригад
        async function loadBrigades() {
            const { data } = await supabase.from('brigades').select('*').order('name');
            allBrigades = data || [];
        }

        // Загрузка этапов работ
        async function loadWorkStages() {
            const { data } = await supabase.from('work_stages').select('*').order('id');
            allWorkStages = data || [];
        }
                // Загрузка проектов
        async function loadProjects() {
            let query = supabase.from('projects').select('*, users!projects_responsible_worker_id_fkey(full_name)').order('created_at', { ascending: false });
            if (currentRole === 'worker') query = query.eq('responsible_worker_id', currentUser?.id);
            const { data } = await query;
            allProjects = data || [];
            renderProjects();
        }

        // Рендер списка проектов
        function renderProjects() {
            let filtered = allProjects;
            if (currentFilter === 'my') {
                filtered = allProjects.filter(p => p.responsible_worker_id === currentUser?.id);
            } else if (currentFilter !== 'all') {
                filtered = allProjects.filter(p => p.status === currentFilter);
            }

            if (!filtered.length) {
                objectsContainer.innerHTML = '<div class="empty-state"><div class="icon">🏗️</div><p>Нет объектов</p></div>';
                return;
            }

            const statusMap = STATUS_MAP.project;
            let html = '';
            
            filtered.forEach(p => {
                const status = statusMap[p.status] || p.status;
                html += `
                <div class="card object-card" onclick="showProjectDetail('${p.id}')">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                        <div>
                            <div style="font-size:18px;font-weight:700;color:var(--text);">${escapeHtml(p.name)}</div>
                            <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">📍 ${escapeHtml(p.address)}</div>
                        </div>
                        <span class="tag tag-gold">${status}</span>
                    </div>
                    <div class="progress">
                        <div class="progress-fill" style="width:0%"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
                        <span style="font-size:13px;color:var(--text-secondary);">👤 ${escapeHtml(p.users?.full_name || '—')}</span>
                        <span style="font-size:13px;color:var(--text-secondary);">📅 ${formatDateShort(p.start_date)}</span>
                    </div>
                </div>`;
            });
            
            objectsContainer.innerHTML = html;
        }

        // Фильтры
        function setupFilters() {
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderProjects();
                });
            });
        }

        // Табы в детальном просмотре
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                    
                    const tabName = this.dataset.tab;
                    if (tabName === 'gpr') loadGPRTab();
                    if (tabName === 'expenses') loadExpensesTab();
                    if (tabName === 'materials') loadMaterialsTab();
                    if (tabName === 'checklist') loadChecklistTab();
                    if (tabName === 'issues') loadIssuesTab();
                    if (tabName === 'reports') loadReportsTab();
                    if (tabName === 'history') loadHistoryTab();
                });
            });
        }

        // Модальные окна
        function setupModals() {
            modalClose.addEventListener('click', () => modalOverlay.classList.add('hidden'));
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) modalOverlay.classList.add('hidden');
            });
        }

        function openModal(title, content, onSave) {
            modalTitle.textContent = title;
            modalContent.innerHTML = content;
            modalOverlay.classList.remove('hidden');
            
            if (onSave) {
                const saveBtn = document.createElement('button');
                saveBtn.className = 'btn btn-primary btn-block';
                saveBtn.textContent = '💾 Сохранить';
                saveBtn.style.marginTop = '16px';
                saveBtn.addEventListener('click', onSave);
                modalContent.appendChild(saveBtn);
            }
        }

        // Показать детали проекта
        window.showProjectDetail = async function(projectId) {
            currentProjectId = projectId;
            const { data: p } = await supabase.from('projects').select('*, users!projects_responsible_worker_id_fkey(full_name)').eq('id', projectId).single();
            if (!p) return;

            document.getElementById('detail-name').textContent = p.name;
            const statusMap = STATUS_MAP.project;
            const statusBadge = document.getElementById('detail-status-badge');
            statusBadge.textContent = statusMap[p.status] || p.status;
            statusBadge.className = 'badge ' + (p.status === 'in_progress' ? 'badge-gold' : p.status === 'completed' ? 'badge-primary' : '');

            mainView.classList.add('hidden');
            detailView.classList.remove('hidden');

            document.getElementById('back-btn').onclick = function() {
                detailView.classList.add('hidden');
                mainView.classList.remove('hidden');
            };

            loadInfoTab(p);
            document.querySelector('[data-tab="info"]').click();
        };

        // Вкладка Инфо
        function loadInfoTab(p) {
            const container = document.getElementById('tab-info');
            container.innerHTML = `
            <div class="card">
                <div class="grid-2" style="margin-bottom:16px;">
                    <div class="stat-mini"><div class="value">${formatMoney(p.contract_price)}</div><div class="label">💰 Цена договора</div></div>
                    <div class="stat-mini"><div class="value">${(p.project_area || 0).toLocaleString()} м²</div><div class="label">📐 Площадь</div></div>
                </div>
                
                <div style="margin-bottom:12px;">
                    <strong>📍 Адрес:</strong> ${escapeHtml(p.address)}
                </div>
                <div style="margin-bottom:12px;">
                    <strong>📅 Начало:</strong> ${formatDate(p.start_date)}
                </div>
                <div style="margin-bottom:12px;">
                    <strong>🏁 Окончание:</strong> ${formatDate(p.end_date_contract)}
                </div>
                <div style="margin-bottom:12px;">
                    <strong>👤 ИТР:</strong> ${escapeHtml(p.users?.full_name || '—')}
                </div>
                <div style="margin-bottom:12px;">
                    <strong>📋 Менеджер:</strong> ${escapeHtml(p.manager_name || '—')} · ${escapeHtml(p.manager_phone || '—')}
                </div>
                
                <div style="margin-bottom:12px;">
                    <strong>📊 Статус:</strong>
                    <select id="change-status" class="form-input" style="display:inline;width:auto;padding:6px 12px;margin-left:8px;">
                        <option value="preparation" ${p.status==='preparation'?'selected':''}>📋 Подготовка</option>
                        <option value="mobilization" ${p.status==='mobilization'?'selected':''}>🚚 Мобилизация</option>
                        <option value="in_progress" ${p.status==='in_progress'?'selected':''}>🔨 В работе</option>
                        <option value="completed" ${p.status==='completed'?'selected':''}>✅ Завершён</option>
                        <option value="paused" ${p.status==='paused'?'selected':''}>⏸️ Пауза</option>
                    </select>
                    <button class="btn btn-gold btn-sm" onclick="updateProjectStatus()" style="margin-left:8px;">Обновить</button>
                </div>
                
                <hr style="border-color:var(--border);margin:16px 0;">
                <h4 style="margin-bottom:12px;">📄 Реквизиты заказчика</h4>
                <div style="margin-bottom:8px;"><strong>№ договора:</strong> ${escapeHtml(p.contract_number || '—')}</div>
                <div style="margin-bottom:8px;"><strong>Компания:</strong> ${escapeHtml(p.customer_company_name || '—')}</div>
                <div style="margin-bottom:8px;"><strong>Директор:</strong> ${escapeHtml(p.customer_director_name || '—')}</div>
                <div style="margin-bottom:8px;"><strong>БИН:</strong> ${escapeHtml(p.customer_bin || '—')}</div>
                <div style="margin-bottom:8px;"><strong>Юр. адрес:</strong> ${escapeHtml(p.customer_legal_address || '—')}</div>
            </div>`;
        }

        window.updateProjectStatus = async function() {
            const newStatus = document.getElementById('change-status').value;
            await supabase.from('projects').update({ status: newStatus }).eq('id', currentProjectId);
            showMessage('✅ Статус обновлён', 'success');
            showProjectDetail(currentProjectId);
        };

        // Вкладка ГПР
        async function loadGPRTab() {
            const container = document.getElementById('tab-gpr');
            container.innerHTML = '<div class="loading"></div>';
            
            const { data: blocks } = await supabase.from('blocks').select('id').eq('project_id', currentProjectId);
            if (!blocks?.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>Нет блоков. Создайте ось для начала.</p><button class="btn btn-primary btn-sm" onclick="createAxis()">➕ Создать ось</button></div>';
                return;
            }
            
            const { data: axes } = await supabase.from('axes').select('*').in('block_id', blocks.map(b => b.id)).order('name');
            if (!axes?.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>Нет осей</p><button class="btn btn-primary btn-sm" onclick="createAxis()">➕ Создать ось</button></div>';
                return;
            }

            let html = '';
            for (const axis of axes) {
                const { data: stages } = await supabase.from('axis_work_stages').select('*, brigades(name), work_stages(name)').eq('axis_id', axis.id);
                const totalProgress = stages?.length ? Math.round(stages.reduce((s, st) => s + (st.progress || 0), 0) / stages.length) : 0;
                
                html += `
                <div class="axis-card-gpr">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <div>
                            <strong style="font-size:16px;">🔵 Ось ${escapeHtml(axis.name)}</strong>
                            <span class="tag tag-blue" style="margin-left:8px;">${axis.status || 'no_brigade'}</span>
                        </div>
                        <span style="font-size:14px;font-weight:700;">${totalProgress}%</span>
                    </div>
                    <div class="progress" style="margin-bottom:8px;">
                        <div class="progress-fill" style="width:${totalProgress}%"></div>
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
                        📅 ${formatDateShort(axis.plan_start)} — ${formatDateShort(axis.plan_end)} | 📐 ${axis.total_area || 0} м²
                    </div>`;
                
                if (stages?.length) {
                    html += '<div style="margin-top:8px;">';
                    stages.forEach(stage => {
                        const stageProgress = stage.progress || 0;
                        html += `
                        <div class="gpr-stage-row">
                            <span style="flex:1;font-size:13px;">${escapeHtml(stage.work_stages?.name || '—')}</span>
                            <span style="font-size:12px;color:var(--text-secondary);">${stage.volume || 0} м²</span>
                            <input type="number" class="form-input" style="width:60px;padding:4px 6px;font-size:12px;" value="${stageProgress}" min="0" max="100" onchange="updateStageProgress('${stage.id}', this.value)">
                            <span style="font-size:12px;font-weight:600;">%</span>
                            <span style="font-size:11px;color:var(--text-secondary);">${formatDateShort(stage.plan_start)}</span>
                        </div>`;
                    });
                    html += '</div>';
                }
                
                html += `
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <button class="btn btn-outline btn-sm" onclick="openAxisDetail('${axis.id}')">👁️ Открыть</button>
                        <button class="btn btn-outline btn-sm" onclick="editAxis('${axis.id}')">✏️</button>
                    </div>
                </div>`;
            }
            
            html += '<button class="btn btn-primary btn-block" onclick="createAxis()" style="margin-top:12px;">➕ Добавить ось</button>';
            container.innerHTML = html;
        }

        window.updateStageProgress = async function(stageId, value) {
            const progress = Math.max(0, Math.min(100, parseInt(value) || 0));
            const status = progress >= 100 ? 'completed' : progress > 0 ? 'in_progress' : 'pending';
            await supabase.from('axis_work_stages').update({ progress, status }).eq('id', stageId);
            showMessage('✅ Прогресс обновлён', 'success');
            loadGPRTab();
        };

        window.createAxis = function() {
            const html = `
            <div class="form-group">
                <label class="form-label">Название оси *</label>
                <input type="text" id="new-axis-name" class="form-input" placeholder="1-10">
            </div>
            <div class="form-group">
                <label class="form-label">Площадь (м²)</label>
                <input type="number" id="new-axis-area" class="form-input" step="0.01" value="0">
            </div>`;
            
            openModal('➕ Создать ось', html, async function() {
                const name = document.getElementById('new-axis-name').value.trim();
                const area = parseFloat(document.getElementById('new-axis-area').value) || 0;
                if (!name) { alert('Введите название оси'); return; }
                
                const { data: blocks } = await supabase.from('blocks').select('id').eq('project_id', currentProjectId);
                if (!blocks?.length) {
                    const { data: block } = await supabase.from('blocks').insert({ project_id: currentProjectId, name: 'Блок 1' }).select('id').single();
                    await supabase.from('axes').insert({ block_id: block.id, name, total_area: area, status: 'no_brigade' });
                } else {
                    await supabase.from('axes').insert({ block_id: blocks[0].id, name, total_area: area, status: 'no_brigade' });
                }
                modalOverlay.classList.add('hidden');
                showMessage('✅ Ось создана', 'success');
                loadGPRTab();
            });
        };

        window.openAxisDetail = async function(axisId) {
            const { data: axis } = await supabase.from('axes').select('*').eq('id', axisId).single();
            const { data: stages } = await supabase.from('axis_work_stages').select('*, brigades(name), work_stages(name)').eq('axis_id', axisId);
            
            let html = `<h4>Ось ${escapeHtml(axis.name)}</h4>
            <p>📐 Площадь: ${axis.total_area || 0} м²</p>
            <p>📅 ${formatDateShort(axis.plan_start)} — ${formatDateShort(axis.plan_end)}</p>`;
            
            if (stages?.length) {
                html += '<div style="margin-top:16px;">';
                stages.forEach(s => {
                    html += `<div class="gpr-stage-row">
                        <span style="flex:1;">${escapeHtml(s.work_stages?.name || '—')}</span>
                        <span>${s.volume} м²</span>
                        <span>${s.progress || 0}%</span>
                        <span class="tag tag-blue">${escapeHtml(s.brigades?.name || '—')}</span>
                    </div>`;
                });
                html += '</div>';
            }
            
            openModal('📊 Детали ГПР', html);
        };

        window.editAxis = async function(axisId) {
            const { data: axis } = await supabase.from('axes').select('*').eq('id', axisId).single();
            if (!axis) return;
            
            const html = `
            <div class="form-group">
                <label class="form-label">Название</label>
                <input type="text" id="edit-axis-name" class="form-input" value="${escapeHtml(axis.name)}">
            </div>
            <div class="form-group">
                <label class="form-label">Площадь</label>
                <input type="number" id="edit-axis-area" class="form-input" value="${axis.total_area || 0}">
            </div>
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select id="edit-axis-status" class="form-input">
                    <option value="no_brigade" ${axis.status==='no_brigade'?'selected':''}>👷 Нет бригады</option>
                    <option value="no_readiness" ${axis.status==='no_readiness'?'selected':''}>⏳ Нет готовности</option>
                    <option value="in_progress" ${axis.status==='in_progress'?'selected':''}>🔨 В работе</option>
                    <option value="completed" ${axis.status==='completed'?'selected':''}>✅ Завершена</option>
                    <option value="paused" ${axis.status==='paused'?'selected':''}>⏸️ Пауза</option>
                </select>
            </div>`;
            
            openModal('✏️ Редактировать ось', html, async function() {
                await supabase.from('axes').update({
                    name: document.getElementById('edit-axis-name').value,
                    total_area: parseFloat(document.getElementById('edit-axis-area').value) || 0,
                    status: document.getElementById('edit-axis-status').value
                }).eq('id', axisId);
                modalOverlay.classList.add('hidden');
                showMessage('✅ Ось обновлена', 'success');
                loadGPRTab();
            });
        };

        // Вкладка Расходы
        async function loadExpensesTab() {
            const container = document.getElementById('tab-expenses');
            container.innerHTML = '<div class="loading"></div>';
            
            const { data } = await supabase.from('expenses').select('*').eq('project_id', currentProjectId).order('date', { ascending: false });
            const expenses = data || [];
            
            let html = '<button class="btn btn-gold btn-block" onclick="addExpense()" style="margin-bottom:16px;">➕ Добавить расход</button>';
            
            if (!expenses.length) {
                html += '<div class="empty-state"><div class="icon">💰</div><p>Нет расходов</p></div>';
            } else {
                expenses.forEach(exp => {
                    const status = STATUS_MAP.expense[exp.payment_status] || exp.payment_status;
                    html += `
                    <div class="card" style="margin-bottom:8px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong>${escapeHtml(exp.name)}</strong>
                            <span style="font-size:18px;font-weight:700;">${formatMoney(exp.amount)}</span>
                        </div>
                        <div style="display:flex;gap:8px;margin-top:8px;font-size:12px;color:var(--text-secondary);">
                            <span>📅 ${formatDateShort(exp.date)}</span>
                            <span>🏢 ${escapeHtml(exp.supplier || '—')}</span>
                            <span class="tag tag-gold">${status}</span>
                        </div>
                    </div>`;
                });
            }
            
            container.innerHTML = html;
        }

        window.addExpense = function() {
            const today = new Date().toISOString().split('T')[0];
            const html = `
            <div class="form-group">
                <label class="form-label">Дата *</label>
                <input type="date" id="exp-date" class="form-input" value="${today}">
            </div>
            <div class="form-group">
                <label class="form-label">Наименование *</label>
                <input type="text" id="exp-name" class="form-input" placeholder="Например: Доставка материалов">
            </div>
            <div class="form-group">
                <label class="form-label">Поставщик</label>
                <input type="text" id="exp-supplier" class="form-input" placeholder="ТОО «Поставщик»">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Количество</label>
                    <input type="number" id="exp-qty" class="form-input" value="1">
                </div>
                <div class="form-group">
                    <label class="form-label">Сумма *</label>
                    <input type="number" id="exp-amount" class="form-input" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select id="exp-status" class="form-input">
                    <option value="pending">⏳ В план оплат</option>
                    <option value="paid">✅ Оплачен</option>
                </select>
            </div>`;
            
            openModal('💰 Добавить расход', html, async function() {
                const name = document.getElementById('exp-name').value.trim();
                const amount = parseFloat(document.getElementById('exp-amount').value);
                if (!name || !amount) { alert('Заполните обязательные поля'); return; }
                
                await supabase.from('expenses').insert({
                    project_id: currentProjectId,
                    date: document.getElementById('exp-date').value,
                    name,
                    supplier: document.getElementById('exp-supplier').value,
                    quantity: parseFloat(document.getElementById('exp-qty').value) || 1,
                    amount,
                    payment_status: document.getElementById('exp-status').value,
                    category: 'other',
                    payment_type: 'invoice',
                    created_by: currentUser?.id
                });
                
                modalOverlay.classList.add('hidden');
                showMessage('✅ Расход добавлен', 'success');
                loadExpensesTab();
            });
        };

        // Вкладка Материалы
        async function loadMaterialsTab() {
            const container = document.getElementById('tab-materials');
            container.innerHTML = '<div class="loading"></div>';
            
            const [matRes, incRes, wbRes] = await Promise.all([
                supabase.from('material_catalog').select('*').eq('project_id', currentProjectId),
                supabase.from('material_incomes').select('*, material_income_items(*)').eq('project_id', currentProjectId).order('created_at', { ascending: false }),
                supabase.from('material_waybills').select('*, material_waybill_items(*), brigades(name)').eq('project_id', currentProjectId).order('created_at', { ascending: false })
            ]);
            
            const materials = matRes.data || [];
            const incomes = incRes.data || [];
            const waybills = wbRes.data || [];
            
            let html = '<div style="display:flex;gap:8px;margin-bottom:16px;">';
            html += '<button class="btn btn-primary btn-block" onclick="addMaterialIncome()">➕ Приход</button>';
            html += '<button class="btn btn-gold btn-block" onclick="issueMaterial()">📤 Выдать</button>';
            html += '</div>';
            
            html += '<h4 style="margin-bottom:12px;">📊 Остатки</h4>';
            if (!materials.length) {
                html += '<div class="empty-state"><div class="icon">📦</div><p>Нет материалов</p></div>';
            } else {
                html += '<div style="overflow-x:auto;"><table style="width:100%;font-size:13px;"><thead><tr><th>Название</th><th>Ед.</th><th>Всего</th><th>Доступно</th></tr></thead><tbody>';
                materials.forEach(m => {
                    html += `<tr><td>${escapeHtml(m.name)}</td><td>${m.unit}</td><td>${m.total_quantity}</td><td>${m.available_quantity}</td></tr>`;
                });
                html += '</tbody></table></div>';
            }
            
            container.innerHTML = html;
        }

        window.addMaterialIncome = function() {
            const html = `
            <div class="form-group">
                <label class="form-label">Поставщик</label>
                <input type="text" id="inc-supplier" class="form-input" placeholder="ТОО «СтройМатериалы»">
            </div>
            <div id="income-items"></div>
            <button class="btn btn-outline btn-sm" onclick="addIncomeItem()" style="margin-top:8px;">+ Добавить позицию</button>`;
            
            openModal('📦 Приход материалов', html, async function() {
                const supplier = document.getElementById('inc-supplier').value;
                alert('✅ Приход создан (упрощённая версия)');
                modalOverlay.classList.add('hidden');
                loadMaterialsTab();
            });
            
            window.addIncomeItem = function() {
                const container = document.getElementById('income-items');
                const div = document.createElement('div');
                div.innerHTML = '<div class="grid-2" style="margin-bottom:8px;"><input type="text" class="form-input" placeholder="Название"><input type="number" class="form-input" placeholder="Кол-во"></div>';
                container.appendChild(div);
            };
        };

        window.issueMaterial = function() {
            openModal('📤 Выдача материала', '<p>Функция в разработке</p>');
        };

        // Заглушки для остальных вкладок
        async function loadChecklistTab() {
            document.getElementById('tab-checklist').innerHTML = '<div class="card"><div class="empty-state"><div class="icon">✅</div><p>Чек-лист загружается...</p></div></div>';
        }

        async function loadIssuesTab() {
            document.getElementById('tab-issues').innerHTML = '<div class="card"><div class="empty-state"><div class="icon">⚠️</div><p>Проблемы загружаются...</p></div></div>';
        }

        async function loadReportsTab() {
            document.getElementById('tab-reports').innerHTML = '<div class="card"><div class="empty-state"><div class="icon">📑</div><p>Отчёты загружаются...</p></div></div>';
        }

        async function loadHistoryTab() {
            const container = document.getElementById('tab-history');
            const { data } = await supabase.from('change_history').select('*').eq('project_id', currentProjectId).order('changed_at', { ascending: false }).limit(20);
            
            if (!data?.length) {
                container.innerHTML = '<div class="card"><div class="empty-state"><div class="icon">📜</div><p>Нет изменений</p></div></div>';
                return;
            }
            
            let html = '<div class="card"><h4>📜 История изменений</h4>';
            data.forEach(h => {
                html += `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
                    <div style="display:flex;justify-content:space-between;">
                        <strong>${h.action}</strong>
                        <span style="font-size:12px;color:var(--text-secondary);">${formatDate(h.changed_at)}</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);">👤 ${escapeHtml(h.changed_by_name || '—')}</div>
                    ${h.comment ? `<div style="font-size:12px;margin-top:4px;">📝 ${escapeHtml(h.comment)}</div>` : ''}
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Запуск
        init();
    })();
    </script>
</body>
</html>

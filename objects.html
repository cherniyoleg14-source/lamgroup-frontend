<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объекты | LamGroup</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #1e3a8a; }
        p { color: #6b7280; margin: 20px 0; }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #1e3a8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Объекты</h1>
        <div class="loader"></div>
        <p>Список объектов появится здесь</p>
        <p style="font-size: 12px;">Раздел в разработке</p>
    </div>
</body>
</html>

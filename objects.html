<!DOCTYPE html>
<html lang="ru">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #F8FAFC; padding: 16px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .app-header h1 { font-size: 24px; font-weight: 800; color: #0F172A; letter-spacing: -0.5px; }
        .logo-badge { background: linear-gradient(135deg, #F59E0B, #F97316); color: white; padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .role-badge { background: #E2E8F0; color: #0F172A; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; border: 1.5px solid #E2E8F0; background: white; color: #64748B; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #0F172A; color: white; border-color: #0F172A; }
        .objects-grid { display: flex; flex-direction: column; gap: 12px; }
        .object-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid #F1F5F9; }
        .object-card:active { transform: scale(0.99); }
        .object-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .object-name { font-size: 16px; font-weight: 700; color: #0F172A; }
        .object-status { padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .status-preparation { background: #FEF3C7; color: #92400E; } .status-mobilization { background: #DBEAFE; color: #1E40AF; } .status-in_progress { background: #D1FAE5; color: #065F46; } .status-completed { background: #E2E8F0; color: #475569; }
        .object-address { font-size: 13px; color: #64748B; margin-bottom: 8px; }
        .progress-section { margin: 12px 0; } .progress-bar { height: 6px; background: #F1F5F9; border-radius: 30px; overflow: hidden; } .progress-fill { height: 100%; background: linear-gradient(90deg, #0F172A, #F59E0B); border-radius: 30px; width: 0%; }
        .object-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #F1F5F9; font-size: 12px; color: #64748B; }
        .back-btn { background: none; border: none; color: #0F172A; font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 0; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .tabs-wrapper { position: relative; margin: 16px 0; }
        .tabs { display: flex; gap: 4px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 6px; border-bottom: 2px solid #E2E8F0; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 12px; background: none; border: none; font-weight: 600; color: #64748B; cursor: pointer; white-space: nowrap; font-size: 12px; border-bottom: 3px solid transparent; }
        .tab.active { color: #0F172A; border-bottom-color: #F59E0B; }
        .scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: white; border: 1px solid #E2E8F0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; font-size: 16px; font-weight: 700; color: #0F172A; }
        .scroll-arrow.left { left: -15px; } .scroll-arrow.right { right: -15px; } .scroll-arrow.hidden { display: none; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .info-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #F1F5F9; }
        .form-group { margin-bottom: 14px; } label { font-weight: 600; color: #475569; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 14px; font-size: 14px; background: white; font-family: 'Inter', sans-serif; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .btn-primary { width: 100%; background: linear-gradient(135deg, #0F172A, #1E293B); color: white; padding: 14px; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn-secondary { background: #F8FAFC; color: #0F172A; padding: 8px 14px; border-radius: 12px; font-weight: 600; border: 1.5px solid #E2E8F0; cursor: pointer; font-size: 12px; }
        .btn-small { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
        .btn-edit { background: #FEF3C7; color: #92400E; } .btn-delete { background: #FEE2E2; color: #991B1B; } .btn-add { background: #DBEAFE; color: #1E40AF; }
        .btn-pdf { background: #F3E8FF; color: #6B21A8; padding: 6px 12px; border-radius: 10px; font-weight: 600; border: 1px solid #D8B4FE; cursor: pointer; font-size: 12px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px 20px; color: #64748B; }
        .empty-state { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; color: #64748B; }
        .message { padding: 14px; border-radius: 14px; margin: 14px 0; display: none; font-weight: 500; font-size: 14px; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; } .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .gpr-item { background: white; border-radius: 16px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #F1F5F9; }
        .axis-card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1.5px solid #E2E8F0; }
        .axis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .axis-name { font-weight: 700; color: #0F172A; font-size: 15px; }
        .axis-dates { font-size: 12px; color: #64748B; margin-bottom: 8px; }
        .brigade-section { background: #F8FAFC; border-radius: 14px; padding: 14px; margin: 10px 0; border: 1px solid #E2E8F0; }
        .brigade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .brigade-name { font-weight: 600; color: #0F172A; font-size: 14px; }
        .work-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 6px 0; }
        .work-table th { text-align: left; padding: 6px; background: #F1F5F9; color: #475569; font-weight: 600; font-size: 10px; }
        .work-table td { padding: 6px; border-bottom: 1px solid #F1F5F9; }
        .work-table .text-right { text-align: right; }
        .progress-input { width: 55px; padding: 5px 6px; border-radius: 8px; border: 1px solid #E2E8F0; text-align: center; font-size: 12px; }
        .status-badge-sm { padding: 3px 6px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .status-in_progress-sm { background: #D1FAE5; color: #065F46; } .status-pending-sm { background: #FEF3C7; color: #92400E; } .status-completed-sm { background: #E2E8F0; color: #475569; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10002; }
        .modal.hidden { display: none !important; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 800; color: #0F172A; }
        .close-btn { background: #F1F5F9; border: none; width: 36px; height: 36px; border-radius: 36px; font-size: 18px; cursor: pointer; color: #64748B; display: flex; align-items: center; justify-content: center; }
        .action-menu-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 16px; z-index: 10003; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 10002; }
        .action-item { padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .fullscreen-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F8FAFC; z-index: 10001; overflow-y: auto; padding: 16px; }
        .checklist-progress-container { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .checklist-stat-card { flex: 1; background: #F8FAFC; border-radius: 20px; padding: 16px; text-align: center; }
        .checklist-stat-value { font-size: 28px; font-weight: 800; color: #0F172A; }
        .checklist-stat-label { font-size: 12px; color: #64748B; }
        .checklist-progress-bar { height: 8px; background: #E2E8F0; border-radius: 40px; overflow: hidden; margin: 16px 0; }
        .checklist-progress-fill { height: 100%; background: linear-gradient(90deg, #0F172A, #F59E0B); }
        .checklist-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #F1F5F9; }
        .checklist-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: #F59E0B; cursor: pointer; }
        .checklist-item label { flex: 1; font-size: 14px; cursor: pointer; text-transform: none; }
        .checklist-completed { text-decoration: line-through; color: #94A3B8; }
        .checklist-section { margin-bottom: 24px; }
        .checklist-section h4 { margin-bottom: 12px; font-size: 16px; color: #0F172A; }
        .filter-chip { padding: 6px 12px; border-radius: 30px; font-size: 12px; border: 1px solid #E2E8F0; background: white; cursor: pointer; }
        .filter-chip.active { background: #0F172A; color: white; border-color: #0F172A; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin: 8px 0; }
        .photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="list-view">
            <div class="app-header"><h1>LamGroup <span class="logo-badge">Construction</span></h1><span class="role-badge" id="role-badge"></span></div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Все</button><button class="filter-btn" data-filter="my">Мои</button>
                <button class="filter-btn" data-filter="preparation">Подготовка</button><button class="filter-btn" data-filter="in_progress">В работе</button><button class="filter-btn" data-filter="completed">Завершён</button>
            </div>
            <div id="objects-container"><div class="loading">Загрузка объектов...</div></div>
        </div>
        <div id="detail-view" class="hidden">
            <button class="back-btn" id="back-btn">← Назад</button>
            <div class="app-header"><h1 id="detail-name"></h1><span class="role-badge" id="detail-status-badge"></span></div>
            <div class="tabs-wrapper">
                <div class="scroll-arrow left hidden" id="scroll-left">←</div>
                <div class="tabs" id="tabs-container">
                    <button class="tab active" data-tab="info">📋 Инфо</button>
                    <button class="tab" data-tab="progress">📊 Прогресс</button>
                    <button class="tab" data-tab="history">📜 История</button>
                    <button class="tab" data-tab="expenses">💰 Расходы</button>
                    <button class="tab" data-tab="materials">📦 Материалы</button>
                    <button class="tab" data-tab="checklist">✅ Чек-лист</button>
                    <button class="tab" data-tab="issues">⚠️ Проблемы</button>
                    <button class="tab" data-tab="report">📑 Отчет</button>
                </div>
                <div class="scroll-arrow right" id="scroll-right">→</div>
            </div>
            <div id="tab-info" class="tab-content active"><div class="info-card" id="detail-content"></div></div>
            <div id="tab-progress" class="tab-content"><div id="progress-container"></div></div>
            <div id="tab-history" class="tab-content"><div id="history-container"></div></div>
            <div id="tab-expenses" class="tab-content"></div>
            <div id="tab-materials" class="tab-content"><div id="materials-container"></div></div>
            <div id="tab-checklist" class="tab-content"></div>
            <div id="tab-issues" class="tab-content"></div>
            <div id="tab-report" class="tab-content"></div>
        </div>
        <div id="axis-detail-page" class="fullscreen-modal hidden"></div>
        <div id="action-overlay" class="action-overlay hidden"></div>
        <div id="action-menu" class="action-menu-modal hidden"></div>
        <div id="form-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="form-modal-title"></span><button class="close-btn" id="close-form-modal">&times;</button></div><div id="form-modal-content"></div></div></div>
        <div id="edit-modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="edit-modal-title"></span><button class="close-btn" id="close-edit-modal">&times;</button></div><div id="edit-modal-content"></div><button class="btn-primary" id="save-edit-btn">Сохранить</button></div></div>
        <div id="message" class="message"></div>
    </div>
        <script>
        window.closeActionMenu = function() { var m=document.getElementById('action-menu'); var o=document.getElementById('action-overlay'); if(m)m.classList.add('hidden'); if(o)o.classList.add('hidden'); };
        window.closeAxisDetailPage = function() { var p=document.getElementById('axis-detail-page'); if(p)p.classList.add('hidden'); if(window._loadProgressTab)window._loadProgressTab(); };
        window.formatDate = function(dateStr) { if(!dateStr) return '—'; var d = new Date(dateStr); return d.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}); };
        window.formatDateShort = function(dateStr) { if(!dateStr) return '—'; var d = new Date(dateStr); return d.toLocaleDateString('ru-RU'); };

        (function() {
            const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
            const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let userId = tg.initDataUnsafe?.user?.id; if (!userId) { alert('Ошибка авторизации'); return; }
            let currentUser = null, currentRole = 'worker', currentProjectId = null, currentFilter = 'all', allProjects = [], allBrigades = [], allWorkStages = [];
            let currentAxisId = null;

            function showMessage(text, type) { const msg = document.getElementById('message'); msg.textContent = text; msg.className = 'message '+type; setTimeout(function(){ msg.className = 'message'; }, 3000); }
            function escapeHtml(text) { if (!text) return ''; return String(text).replace(/[&<>]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c] || c; }); }

            async function init() { await loadUser(); await loadBrigades(); await loadWorkStages(); await loadProjects(); setupFilters(); setupTabs(); setupTabsScroll(); setupModals(); }
            async function loadUser() { const { data } = await supabase.from('users').select('*').eq('telegram_id', userId).single(); if (data) { currentUser = data; currentRole = data.role; } document.getElementById('role-badge').textContent = currentRole === 'manager' ? 'Руководитель' : currentRole === 'worker' ? 'ИТР' : 'Монтажник'; }
            async function loadBrigades() { const { data } = await supabase.from('brigades').select('*').order('name'); allBrigades = data || []; }
            async function loadWorkStages() { const { data } = await supabase.from('work_stages').select('*').order('id'); allWorkStages = data || []; }
            async function loadProjects() { let query = supabase.from('projects').select('*, users!projects_responsible_worker_id_fkey(full_name)').order('created_at', { ascending: false }); if (currentRole === 'worker') query = query.eq('responsible_worker_id', currentUser?.id); const { data } = await query; allProjects = data || []; renderProjects(); }

            function renderProjects() {
                let filtered = allProjects;
                if (currentFilter === 'my') filtered = allProjects.filter(function(p) { return p.responsible_worker_id === currentUser?.id; });
                else if (currentFilter !== 'all') filtered = allProjects.filter(function(p) { return p.status === currentFilter; });
                const container = document.getElementById('objects-container');
                if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">🏗️ Нет объектов</div>'; return; }
                let html = '<div class="objects-grid">';
                filtered.forEach(function(p) { const st = { 'preparation': '📋 Подготовка', 'mobilization': '🚚 Мобилизация', 'in_progress': '🔨 В работе', 'completed': '✅ Завершён' }[p.status] || p.status;
                    html += '<div class="object-card" data-id="'+p.id+'"><div class="object-header"><span class="object-name">'+p.name+'</span><span class="object-status status-'+p.status+'">'+st+'</span></div><div class="object-address">📍 '+p.address+'</div><div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div></div><div class="object-footer"><div>👤 '+(p.users?.full_name || '—')+'</div><div>📅 '+window.formatDateShort(p.start_date)+'</div></div></div>'; });
                container.innerHTML = html + '</div>';
                container.querySelectorAll('.object-card').forEach(function(c) { c.addEventListener('click', function() { showDetail(c.dataset.id); }); });
            }

            function setupFilters() { document.querySelectorAll('.filter-btn').forEach(function(btn) { btn.addEventListener('click', function() { document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); }); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderProjects(); }); }); }
            function setupTabs() { document.querySelectorAll('.tab').forEach(function(t) { t.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); }); document.querySelectorAll('.tab-content').forEach(function(x) { x.classList.remove('active'); }); t.classList.add('active'); document.getElementById('tab-'+t.dataset.tab).classList.add('active'); if (t.dataset.tab === 'progress') loadProgressTab(); if (t.dataset.tab === 'history') loadHistoryTab(); if (t.dataset.tab === 'materials') loadMaterialsTab(); if (t.dataset.tab === 'checklist') loadChecklist();if (t.dataset.tab === 'expenses') loadExpenses();if (t.dataset.tab === 'issues') loadIssues();if (t.dataset.tab === 'report') loadReports(); }); }); }
            function setupTabsScroll() { const tabsContainer = document.getElementById('tabs-container'); const scrollLeft = document.getElementById('scroll-left'); const scrollRight = document.getElementById('scroll-right'); if (!tabsContainer) return; function updateArrows() { if (scrollLeft) scrollLeft.classList.toggle('hidden', tabsContainer.scrollLeft <= 0); if (scrollRight) scrollRight.classList.toggle('hidden', tabsContainer.scrollLeft >= tabsContainer.scrollWidth - tabsContainer.clientWidth - 1); } if (scrollLeft) scrollLeft.addEventListener('click', function() { tabsContainer.scrollBy({ left: -200, behavior: 'smooth' }); }); if (scrollRight) scrollRight.addEventListener('click', function() { tabsContainer.scrollBy({ left: 200, behavior: 'smooth' }); }); tabsContainer.addEventListener('scroll', updateArrows); window.addEventListener('resize', updateArrows); setTimeout(updateArrows, 300); setTimeout(updateArrows, 600); }
            function setupModals() { document.getElementById('close-form-modal').onclick = function() { document.getElementById('form-modal').classList.add('hidden'); }; document.getElementById('close-edit-modal').onclick = function() { document.getElementById('edit-modal').classList.add('hidden'); }; document.getElementById('action-overlay').onclick = closeActionMenu; }

            async function showDetail(id) {
                currentProjectId = id;
                const { data: p } = await supabase.from('projects').select('*, users(full_name)').eq('id', id).single(); if (!p) return;
                document.getElementById('detail-name').textContent = p.name;
                document.getElementById('detail-status-badge').textContent = { 'preparation':'📋 Подготовка','mobilization':'🚚 Мобилизация','in_progress':'🔨 В работе','completed':'✅ Завершён' }[p.status]||p.status;
                document.getElementById('detail-content').innerHTML = 
                    '<p style="margin-bottom:8px"><strong>📍 Адрес:</strong> '+p.address+' <button class="btn-small btn-edit" onclick="window.openEditField(\'address\',\''+escapeHtml(p.address)+'\')">✏️</button></p>'+

                const modalHtml = '<div class="form-group"><label>📅 Дата создания</label><input type="text" value="'+today+'" disabled style="background:#F8FAFC;"></div><div class="form-group"><label>📝 Наименование *</label><input type="text" id="issue-title"></div><div class="form-group"><label>📄 Описание *</label><textarea id="issue-description" rows="3"></textarea></div><div class="form-group"><label>📍 Оси</label>'+axesHtml+'</div><div class="form-group"><label><input type="checkbox" id="issue-urgent" style="width:auto;"> 🚨 Срочная проблема</label></div><div id="deadline-group" style="display:none;" class="form-group"><label>📅 Крайний срок</label><input type="date" id="issue-deadline" value="'+defaultDeadline.toISOString().split('T')[0]+'"></div><div class="form-group"><label>🔴 Приоритет</label><select id="issue-priority"><option value="low">Низкий</option><option value="medium" selected>Средний</option><option value="high">Высокий</option></select></div><div class="form-group"><label>👤 Ответственные (можно нескольких)</label>'+usersHtml+'</div><div class="form-group"><label>📎 Фото</label><input type="file" id="issue-photo" accept="image/*" multiple></div><button class="btn-primary" id="save-issue-btn">📤 Создать</button>';
                document.getElementById('form-modal-title').textContent = '⚠️ Новая проблема';
                document.getElementById('form-modal-content').innerHTML = modalHtml;
                document.getElementById('form-modal').classList.remove('hidden');
                document.getElementById('issue-urgent').onchange = (e) => { document.getElementById('deadline-group').style.display = e.target.checked ? 'block' : 'none'; const priority = document.getElementById('issue-priority'); if (e.target.checked) { priority.value = 'high'; priority.disabled = true; } else { priority.value = 'medium'; priority.disabled = false; } };
                document.getElementById('save-issue-btn').onclick = async () => {
                    const title = document.getElementById('issue-title').value.trim();
                    const desc = document.getElementById('issue-description').value.trim();
                    const priority = document.getElementById('issue-priority').value;
                    const isUrgent = document.getElementById('issue-urgent').checked;
                    const deadline = isUrgent ? document.getElementById('issue-deadline').value : null;
                    const axes = Array.from(document.getElementById('issue-axes').selectedOptions).map(o => o.value);
                    const responsible = Array.from(document.getElementById('issue-responsible').selectedOptions).map(o => o.value);
                    if (!title || !desc) { alert('Заполните наименование и описание'); return; }
                    if (!responsible.length) { alert('Выберите ответственного'); return; }
                    if (isUrgent && !deadline) { alert('Укажите крайний срок'); return; }
                    const photos = [];
                    for (const file of document.getElementById('issue-photo').files) { const fileName = 'issues/'+currentProjectId+'/'+Date.now()+'_'+file.name; const { error } = await supabase.storage.from('reports').upload(fileName, file); if (!error) { const { data: url } = supabase.storage.from('reports').getPublicUrl(fileName); photos.push(url.publicUrl); } }
                    const { error } = await supabase.from('project_issues').insert({ project_id: currentProjectId, title, description: desc, priority, is_urgent: isUrgent, deadline, axes_selected: axes, photos, responsible_ids: responsible, status: 'open', created_by: currentUser?.id, created_by_name: currentUser?.full_name, created_at: new Date() });
                    if (error) alert('Ошибка: ' + error.message);
                    else { document.getElementById('form-modal').classList.add('hidden'); loadIssues(); showMessage('✅ Проблема создана', 'success'); }
                };
            }

            // ========== ОТЧЁТЫ ==========
            async function loadReports() {
                const container = document.getElementById('tab-report');
                container.innerHTML = '<div class="loading">Загрузка отчётов...</div>';
                const { data, error } = await supabase.from('object_reports').select('*').eq('project_id', currentProjectId).order('report_date', { ascending: false });
                if (error) { container.innerHTML = '<div class="info-card"><p class="error">Ошибка: '+error.message+'</p></div>'; return; }
                const reports = data || [];
                const nextNumber = reports.length > 0 ? Math.max(...reports.map(r => r.report_number || 0)) + 1 : 1;
                const { data: blocks } = await supabase.from('blocks').select('id').eq('project_id', currentProjectId);
                let axesList = [];
                if (blocks && blocks.length) { const blockIds = blocks.map(b => b.id); const { data: axes } = await supabase.from('axes').select('name').in('block_id', blockIds); axesList = axes || []; }
                let html = '<div class="info-card"><h3 style="margin-bottom: 20px;">📝 Создать новый отчёт</h3>';
                html += '<div class="form-group"><label>📅 Дата отчёта</label><input type="date" id="report-date" value="'+new Date().toISOString().split('T')[0]+'"></div>';
                html += '<div class="form-group"><label>🔢 Номер отчёта</label><input type="text" id="report-number" value="№'+nextNumber+'" disabled style="background: #F8FAFC;"></div>';
                html += '<div class="form-group"><label>📍 Выберите оси для отчёта *</label><div id="report-axes-list" style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;">';
                axesList.forEach(axis => { html += '<label style="display: flex; align-items: center; gap: 8px;"><input type="checkbox" class="report-axis-cb" value="'+axis.name+'" data-name="'+axis.name+'"><span>'+axis.name+'</span></label>'; });
                html += '</div></div><div class="form-group"><label>📝 Описание отчёта</label><textarea id="report-description" rows="4" placeholder="Опишите выполненные работы за период..."></textarea></div>';
                html += '<div class="form-group"><label><input type="checkbox" id="report-has-issues" style="width: auto; margin-right: 8px;"> ⚠️ В отчёте описаны проблемы</label></div>';
                html += '<div class="form-group"><label>📸 Фото по осям (обязательно для каждой выбранной оси)</label><div id="report-photo-fields"></div></div>';
                html += '<button class="btn-primary" id="submit-report-btn">📤 Отправить отчёт</button></div>';
                html += '<div class="info-card"><h3 style="margin-bottom: 16px;">📋 История отчётов</h3><div id="reports-list"></div></div>';
                container.innerHTML = html;
                document.querySelectorAll('.report-axis-cb').forEach(cb => { cb.addEventListener('change', renderPhotoFields); });
                function renderPhotoFields() { const selectedAxes = Array.from(document.querySelectorAll('.report-axis-cb:checked')).map(cb => cb.value); const photoContainer = document.getElementById('report-photo-fields'); if (selectedAxes.length === 0) { photoContainer.innerHTML = '<p style="color: #64748B; font-size: 13px;">Выберите оси для отчёта</p>'; return; } let fieldsHtml = '<div style="margin-top: 12px;">'; selectedAxes.forEach(axis => { fieldsHtml += '<div class="axis-photo-item" style="display: flex; align-items: center; gap: 12px; padding: 10px; background: #F8FAFC; border-radius: 14px; margin-bottom: 10px;"><span style="width: 80px; font-weight: 600;">📍 '+axis+'</span><input type="file" class="photo-input" data-axis="'+axis+'" accept="image/*" capture="environment" style="flex: 1; padding: 8px;"><img class="photo-preview" data-axis="'+axis+'" style="width: 50px; height: 50px; object-fit: cover; border-radius: 10px; display: none;"></div>'; }); fieldsHtml += '</div>'; photoContainer.innerHTML = fieldsHtml; document.querySelectorAll('.photo-input').forEach(input => { input.addEventListener('change', (e) => { const file = e.target.files[0]; const axis = input.dataset.axis; const preview = document.querySelector('.photo-preview[data-axis="'+axis+'"]'); if (file && preview) { const reader = new FileReader(); reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = 'block'; }; reader.readAsDataURL(file); } }); }); }
                document.getElementById('submit-report-btn').addEventListener('click', async () => {
                    const reportDate = document.getElementById('report-date').value;
                    const description = document.getElementById('report-description').value.trim();
                    const hasIssues = document.getElementById('report-has-issues').checked;
                    const selectedAxes = Array.from(document.querySelectorAll('.report-axis-cb:checked')).map(cb => cb.value);
                    if (selectedAxes.length === 0) { alert('Выберите хотя бы одну ось для отчёта'); return; }
                    const photoInputs = document.querySelectorAll('.photo-input');
                    const missingPhotos = [];
                    for (const input of photoInputs) { if (!input.files || !input.files[0]) { missingPhotos.push(input.dataset.axis); } }
                    if (missingPhotos.length > 0) { alert('Добавьте фото для осей: '+missingPhotos.join(', ')); return; }
                    const photos = [];
                    for (const input of photoInputs) { const axis = input.dataset.axis; const file = input.files[0]; if (file) { const ext = file.name.split('.').pop(); const cleanName = Date.now() + '_' + axis.replace(/[^a-zA-Z0-9]/g, '_') + '.' + ext; const fileName = currentProjectId+'/'+cleanName; const { error: uploadError } = await supabase.storage.from('reports').upload(fileName, file); if (uploadError) { alert('Ошибка загрузки фото: ' + uploadError.message); } else { const { data: urlData } = supabase.storage.from('reports').getPublicUrl(fileName); photos.push({ axis, url: urlData.publicUrl }); } } }
                    const { error: insertError } = await supabase.from('object_reports').insert({ report_number: nextNumber, project_id: currentProjectId, report_date: reportDate, axes_selected: selectedAxes, description: description, has_issues: hasIssues, photos: photos, status: 'pending', created_by: currentUser?.id, created_by_name: currentUser?.full_name, created_by_role: currentRole, created_at: new Date() }).select('id').single();
                    if (insertError) { alert('Ошибка: ' + insertError.message); return; }
                    showMessage('✅ Отчёт отправлен на проверку руководителю.', 'success');
                    loadReports();
                });
                function renderReportsList() { const listContainer = document.getElementById('reports-list'); if (reports.length === 0) { listContainer.innerHTML = '<p style="color: #64748B; text-align: center; padding: 20px;">Нет отчётов</p>'; return; } let html = ''; for (const report of reports) { const isConfirmed = report.status === 'confirmed'; const photos = report.photos || []; const photoThumbs = photos.slice(0, 3).map(p => '<img src="'+p.url+'" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px; cursor: pointer;" onclick="event.stopPropagation(); window.open(\''+p.url+'\', \'_blank\')">').join(''); html += '<div class="gpr-item" style="margin-bottom: 12px; cursor: pointer;" onclick="viewReportDetails(\''+report.id+'\')"><div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;"><div><strong>📄 ОТЧЁТ №'+report.report_number+' от '+new Date(report.report_date).toLocaleDateString('ru-RU')+'</strong>'+(report.has_issues ? '<span style="background:#FEE2E2; color:#991B1B; padding:2px 8px; border-radius:20px; font-size:10px; margin-left:8px;">⚠️ Проблемы</span>' : '')+'</div><span style="font-size: 12px; padding: 4px 10px; border-radius: 20px; background: '+(isConfirmed ? '#D1FAE5' : '#FEF3C7')+'; color: '+(isConfirmed ? '#065F46' : '#92400E')+';">'+(isConfirmed ? '✅ Проверен' : '⏳ На проверке')+'</span></div><div style="font-size: 13px; color: #64748B; margin-bottom: 6px;">📍 Оси: '+(report.axes_selected?.join(', ') || '—')+' | 📸 Фото: '+photos.length+' шт.</div>'+(photoThumbs ? '<div style="display: flex; gap: 6px; margin: 8px 0;">'+photoThumbs+'</div>' : '')+'<div style="font-size: 13px; margin-bottom: 6px;">📝 '+(report.description || '').substring(0, 100)+((report.description || '').length > 100 ? '...' : '')+'</div><div style="font-size: 11px; color: #64748B;">👤 '+(report.created_by_name || '—')+' ('+(report.created_by_role === 'manager' ? 'Руководитель' : 'ИТР')+')</div></div>'; } listContainer.innerHTML = html; }
                renderReportsList();
            }

            window.viewReportDetails = async function(reportId) {
                const { data: report } = await supabase.from('object_reports').select('*').eq('id', reportId).single();
                if (!report) return;
                let photosHtml = '';
                if (report.photos && report.photos.length) { photosHtml = '<div style="margin-top: 16px;"><h4>📸 Фото по осям:</h4><div style="display: flex; flex-direction: column; gap: 16px; margin-top: 12px;">'; report.photos.forEach(photo => { photosHtml += '<div style="background: #F8FAFC; border-radius: 16px; padding: 12px;"><div style="font-weight: 600; margin-bottom: 8px;">📍 '+photo.axis+'</div><img src="'+photo.url+'" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; cursor: pointer;" onclick="window.open(\''+photo.url+'\', \'_blank\')"></div>'; }); photosHtml += '</div></div>'; }
                const modalHtml = '<div style="max-height: 70vh; overflow-y: auto;"><div style="margin-bottom: 16px;"><strong style="font-size: 18px;">📄 Отчёт №'+report.report_number+' от '+new Date(report.report_date).toLocaleDateString('ru-RU')+'</strong></div><div style="margin-bottom: 12px;"><strong>📍 Оси:</strong> '+(report.axes_selected?.join(', ') || '—')+'</div><div style="margin-bottom: 16px;"><strong>📝 Описание:</strong><div style="background: #F8FAFC; padding: 14px; border-radius: 14px; margin-top: 6px; line-height: 1.5;">'+escapeHtml(report.description || '—')+'</div></div>'+(report.has_issues ? '<div style="margin-bottom: 12px;"><span style="background:#FEE2E2; color:#991B1B; padding:4px 12px; border-radius:20px; font-size:12px;">⚠️ В отчёте описаны проблемы</span></div>' : '')+photosHtml+'<div style="margin-top: 20px; padding-top: 12px; border-top: 1px solid #E2E8F0; font-size: 12px; color: #64748B;"><div>👤 Создал: '+(report.created_by_name || '—')+' ('+(report.created_by_role === 'manager' ? 'Руководитель' : 'ИТР')+')</div><div>📅 Дата создания: '+new Date(report.created_at).toLocaleString()+'</div></div></div>';
                document.getElementById('form-modal-title').textContent = '📄 Детали отчёта';
                document.getElementById('form-modal-content').innerHTML = modalHtml;
                document.getElementById('form-modal').classList.remove('hidden');
            };

            init();
        })();
    </script>
</body>
</html>

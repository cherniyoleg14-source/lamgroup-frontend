<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Создать объект | LamGroup</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 16px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; }
        h1 { color: #1a2e4b; margin-bottom: 24px; font-size: 26px; font-weight: 800; }
        .form-group { margin-bottom: 16px; }
        label { font-weight: 600; color: #475569; font-size: 13px; text-transform: uppercase; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 16px; font-size: 15px; background: white; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary { width: 100%; background: #1a2e4b; color: white; padding: 16px; border-radius: 16px; font-weight: 700; border: none; margin-top: 24px; cursor: pointer; }
        .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 16px; color: #1a2e4b; }
        .stage-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 12px; background: #f8fafc; border-radius: 14px; }
        .stage-item input[type="checkbox"] { width: 24px; height: 24px; accent-color: #1a2e4b; }
        .stage-name { flex: 1; font-weight: 500; }
        .stage-price { width: 100px; }
        .stage-unit { width: 80px; }
        .axis-item { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-add { background: none; border: 2px dashed #cbd5e0; padding: 12px; border-radius: 14px; width: 100%; cursor: pointer; font-weight: 600; color: #64748b; }
        .btn-remove { background: #fee2e2; border: none; color: #dc2626; width: 44px; border-radius: 14px; font-size: 18px; cursor: pointer; }
        .message { padding: 14px; border-radius: 14px; margin-top: 16px; display: none; }
        .message.success { background: #d1fae5; color: #065f46; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; }
        .message.info { background: #dbeafe; color: #1e40af; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ Новый объект</h1>
        <form id="project-form">
            <div class="form-group"><label>Название *</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Адрес *</label><input type="text" id="address" required></div>
            <div class="row-2">
                <div class="form-group"><label>Цена договора (₸) *</label><input type="number" id="contract_price" required></div>
                <div class="form-group"><label>Проектная S (м²) *</label><input type="number" id="project_area" required></div>
            </div>
            <div class="row-2">
                <div class="form-group"><label>Дата начала *</label><input type="date" id="start_date" required></div>
                <div class="form-group"><label>Дата окончания (договор) *</label><input type="date" id="end_date_contract" required></div>
            </div>
            
            <div class="section-title">📊 Расценки для Заказчика</div>
            <div id="stages-container"></div>
            
            <div class="section-title">📍 Оси объекта</div>
            <div id="axes-container"></div>
            <button type="button" class="btn-add" id="add-axis">+ Добавить ось</button>
            
            <button type="submit" class="btn-primary">Создать объект</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
            const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            let userId = tg.initDataUnsafe?.user?.id || 531738802;
            let workStages = [];
            
            const stagesContainer = document.getElementById('stages-container');
            const axesContainer = document.getElementById('axes-container');
            const messageDiv = document.getElementById('message');
            
            function showMessage(text, type) { messageDiv.textContent = text; messageDiv.className = `message ${type}`; }
            
            async function loadStages() {
                const { data } = await supabase.from('work_stages').select('*').order('id');
                workStages = data || [];
                stagesContainer.innerHTML = workStages.map(s => `
                    <div class="stage-item">
                        <input type="checkbox" class="stage-check" data-id="${s.id}" data-name="${s.name}">
                        <span class="stage-name">${s.name}</span>
                        <input type="number" placeholder="Цена" class="stage-price" data-id="${s.id}" step="0.01">
                        <select class="stage-unit" data-id="${s.id}">
                            <option value="м²">м²</option>
                            <option value="п.м.">п.м.</option>
                        </select>
                    </div>
                `).join('');
            }
            
            function createAxisInput() {
                const div = document.createElement('div'); div.className = 'axis-item';
                div.innerHTML = `<input type="text" name="axis_name[]" placeholder="Например: Ось А/1"><button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
                return div;
            }
            
            axesContainer.appendChild(createAxisInput());
            document.getElementById('add-axis').addEventListener('click', () => axesContainer.appendChild(createAxisInput()));
            
            const today = new Date(); const future = new Date(); future.setDate(today.getDate() + 30);
            document.getElementById('start_date').value = today.toISOString().split('T')[0];
            document.getElementById('end_date_contract').value = future.toISOString().split('T')[0];
            
            document.getElementById('project-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                showMessage('Создаём объект...', 'info');
                
                try {
                    const name = document.getElementById('name').value;
                    const address = document.getElementById('address').value;
                    const contract_price = parseFloat(document.getElementById('contract_price').value);
                    const project_area = parseFloat(document.getElementById('project_area').value);
                    const start_date = document.getElementById('start_date').value;
                    const end_date_contract = document.getElementById('end_date_contract').value;
                    
                    const axes = Array.from(document.querySelectorAll('input[name="axis_name[]"]')).map(i => i.value).filter(v => v);
                    if (axes.length === 0) { showMessage('Добавьте хотя бы одну ось', 'error'); return; }
                    
                    const { data: userData } = await supabase.from('users').select('id').eq('telegram_id', userId).single();
                    if (!userData) { showMessage('Пользователь не найден', 'error'); return; }
                    
                    const { data: project, error } = await supabase.from('projects').insert({
                        name, address, contract_price, project_area, start_date, end_date_contract,
                        responsible_worker_id: userData.id, status: 'preparation', block_count: 1
                    }).select('id').single();
                    if (error) throw error;
                    
                    const { data: block } = await supabase.from('blocks').insert({ project_id: project.id, name: 'Блок 1' }).select('id').single();
                    await supabase.from('axes').insert(axes.map(name => ({ block_id: block.id, name })));
                    
                    // Сохраняем расценки для заказчика
                    for (const cb of document.querySelectorAll('.stage-check:checked')) {
                        const stageId = cb.dataset.id;
                        const price = parseFloat(document.querySelector(`.stage-price[data-id="${stageId}"]`).value) || 0;
                        const unit = document.querySelector(`.stage-unit[data-id="${stageId}"]`).value;
                        if (price > 0) {
                            await supabase.from('customer_prices').insert({
                                project_id: project.id, stage_id: stageId, price: price, unit: unit
                            });
                        }
                    }
                    
                    showMessage(`✅ Объект "${name}" создан!`, 'success');
                    setTimeout(() => tg.close(), 1500);
                } catch (err) {
                    showMessage('Ошибка: ' + err.message, 'error');
                }
            });
            
            loadStages();
        })();
    </script>
</body>
</html>

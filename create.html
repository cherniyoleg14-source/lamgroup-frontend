<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Создать объект | LamGroup</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f3f4f6;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        label .required {
            color: #dc2626;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .axes-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
        .axis-input {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .axis-input input {
            flex: 1;
        }
        .btn-add {
            background: none;
            border: 1px dashed #9ca3af;
            color: #4b5563;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-add:hover {
            background: #f9fafb;
            border-color: #1e3a8a;
            color: #1e3a8a;
        }
        .btn-remove {
            background: #fee2e2;
            border: none;
            color: #dc2626;
            width: 36px;
            height: 44px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-submit {
            width: 100%;
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #1e40af;
        }
        .btn-submit:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .message.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }
        .note {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🏗️</span> 
            <span>Новый объект</span>
        </h1>
        
        <form id="project-form">
            <!-- Название -->
            <div class="form-group">
                <label>Название объекта <span class="required">*</span></label>
                <input type="text" id="name" placeholder="Например: ЖК Солнечный" required>
            </div>
            
            <!-- Адрес -->
            <div class="form-group">
                <label>Адрес <span class="required">*</span></label>
                <input type="text" id="address" placeholder="ул. Примерная, д. 1" required>
            </div>
            
            <!-- Ссылка 2ГИС -->
            <div class="form-group">
                <label>Ссылка 2ГИС <span class="required">*</span></label>
                <input type="url" id="gis_link" placeholder="https://2gis.ru/..." required>
            </div>
            
            <div class="row-2">
                <!-- Проектная площадь -->
                <div class="form-group">
                    <label>Проектная S (м²) <span class="required">*</span></label>
                    <input type="number" step="0.01" id="project_area" placeholder="1000" required>
                </div>
                
                <!-- Фактическая площадь -->
                <div class="form-group">
                    <label>Фактическая S (м²)</label>
                    <input type="number" step="0.01" id="actual_area" value="0">
                </div>
            </div>
            
            <div class="row-2">
                <!-- Парапеты -->
                <div class="form-group">
                    <label>Парапеты (п.м.)</label>
                    <input type="number" step="0.01" id="parapet_qty" value="0">
                </div>
                
                <!-- Откосы -->
                <div class="form-group">
                    <label>Откосы (п.м.)</label>
                    <input type="number" step="0.01" id="slope_qty" value="0">
                </div>
            </div>
            
            <div class="row-2">
                <!-- Дата начала -->
                <div class="form-group">
                    <label>Дата начала <span class="required">*</span></label>
                    <input type="date" id="start_date" required>
                </div>
                
                <!-- Дата окончания -->
                <div class="form-group">
                    <label>Дата окончания (ГПР) <span class="required">*</span></label>
                    <input type="date" id="end_date_contract" required>
                </div>
            </div>
            
            <!-- Количество блоков -->
            <div class="form-group">
                <label>Количество блоков</label>
                <select id="block_count">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
            
            <!-- Оси -->
            <div class="axes-section">
                <label>Оси объекта <span class="required">*</span></label>
                <div id="axes-container"></div>
                <button type="button" class="btn-add" id="add-axis">+ Добавить ось</button>
                <div class="note">Например: А/1, Б/2-4</div>
            </div>
            
            <button type="submit" class="btn-submit" id="submit-btn">Создать объект</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Настройка Supabase (ЗАМЕНИ НА СВОИ КЛЮЧИ!)
        const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Получаем telegram_id пользователя
        let userId = null;
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
        }
        
        // DOM элементы
        const axesContainer = document.getElementById('axes-container');
        const addAxisBtn = document.getElementById('add-axis');
        const form = document.getElementById('project-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');
        
        // Функция показа сообщения
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }
        
        // Функция создания поля для оси
        function createAxisInput(value = '') {
            const div = document.createElement('div');
            div.className = 'axis-input';
            div.innerHTML = `
                <input type="text" name="axis_name[]" placeholder="Например: А/1" value="${value}" class="axis-field">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
            `;
            return div;
        }
        
        // Добавляем первую ось
        axesContainer.appendChild(createAxisInput(''));
        
        // Обработчик добавления оси
        addAxisBtn.addEventListener('click', () => {
            axesContainer.appendChild(createAxisInput(''));
        });
        
        // Устанавливаем даты по умолчанию (сегодня и +30 дней)
        const today = new Date();
        const future = new Date();
        future.setDate(today.getDate() + 30);
        
        document.getElementById('start_date').value = today.toISOString().split('T')[0];
        document.getElementById('end_date_contract').value = future.toISOString().split('T')[0];
        
        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!userId) {
                showMessage('Ошибка: не удалось определить пользователя Telegram', 'error');
                return;
            }
            
            // Блокируем кнопку
            submitBtn.disabled = true;
            submitBtn.textContent = 'Сохранение...';
            showMessage('Создаём объект...', 'info');
            
            try {
                // Собираем данные формы
                const name = document.getElementById('name').value.trim();
                const address = document.getElementById('address').value.trim();
                const gis_link = document.getElementById('gis_link').value.trim();
                const project_area = parseFloat(document.getElementById('project_area').value);
                const actual_area = parseFloat(document.getElementById('actual_area').value) || 0;
                const parapet_qty = parseFloat(document.getElementById('parapet_qty').value) || 0;
                const slope_qty = parseFloat(document.getElementById('slope_qty').value) || 0;
                const start_date = document.getElementById('start_date').value;
                const end_date_contract = document.getElementById('end_date_contract').value;
                const block_count = parseInt(document.getElementById('block_count').value);
                
                // Собираем оси
                const axisInputs = document.querySelectorAll('input[name="axis_name[]"]');
                const axes = Array.from(axisInputs)
                    .map(input => input.value.trim())
                    .filter(v => v !== '');
                
                if (axes.length === 0) {
                    showMessage('Добавьте хотя бы одну ось!', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать объект';
                    return;
                }
                
                // 1. Находим UUID пользователя в базе
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('id')
                    .eq('telegram_id', userId)
                    .single();
                
                if (userError || !userData) {
                    showMessage('Пользователь не найден. Пройдите регистрацию в боте (/start)', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать объект';
                    return;
                }
                
                const responsible_worker_id = userData.id;
                
                // 2. Создаём объект
                const { data: projectData, error: projectError } = await supabase
                    .from('projects')
                    .insert({
                        name: name,
                        address: address,
                        gis_link: gis_link,
                        project_area: project_area,
                        actual_area: actual_area,
                        parapet_qty: parapet_qty,
                        slope_qty: slope_qty,
                        start_date: start_date,
                        end_date_contract: end_date_contract,
                        block_count: block_count,
                        responsible_worker_id: responsible_worker_id,
                        status: 'active'
                    })
                    .select('id')
                    .single();
                
                if (projectError) {
                    console.error('Ошибка создания проекта:', projectError);
                    showMessage('Ошибка при создании объекта: ' + projectError.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать объект';
                    return;
                }
                
                const projectId = projectData.id;
                
                // 3. Создаём блоки (пока все оси в первый блок)
                const blockNames = [];
                for (let i = 1; i <= block_count; i++) {
                    blockNames.push(`Блок ${i}`);
                }
                
                const blocksToInsert = blockNames.map(name => ({
                    project_id: projectId,
                    name: name,
                    description: ''
                }));
                
                const { data: blocksData, error: blocksError } = await supabase
                    .from('blocks')
                    .insert(blocksToInsert)
                    .select('id, name');
                
                if (blocksError) {
                    console.error('Ошибка создания блоков:', blocksError);
                    showMessage('Ошибка при создании блоков', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать объект';
                    return;
                }
                
                // 4. Создаём оси (пока все в первый блок)
                const firstBlockId = blocksData[0].id;
                const axesToInsert = axes.map(name => ({
                    block_id: firstBlockId,
                    name: name,
                    progress_percent: 0
                }));
                
                const { error: axesError } = await supabase
                    .from('axes')
                    .insert(axesToInsert);
                
                if (axesError) {
                    console.error('Ошибка создания осей:', axesError);
                    showMessage('Ошибка при создании осей', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Создать объект';
                    return;
                }
                
                // Успех!
                showMessage(`✅ Объект "${name}" успешно создан!`, 'success');
                form.reset();
                
                // Очищаем оси и добавляем одну пустую
                axesContainer.innerHTML = '';
                axesContainer.appendChild(createAxisInput(''));
                
                // Восстанавливаем даты
                document.getElementById('start_date').value = today.toISOString().split('T')[0];
                document.getElementById('end_date_contract').value = future.toISOString().split('T')[0];
                
                // Закрываем Mini App через 2 секунды
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Неожиданная ошибка:', error);
                showMessage('Неожиданная ошибка: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Создать объект';
            }
        });
    </script>
</body>
</html>

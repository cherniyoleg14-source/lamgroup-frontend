<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC; --card: #FFFFFF; --text: #0F172A; --text-secondary: #64748B;
            --border: #E2E8F0; --gold: #F59E0B; --primary: #0F172A; --success: #10B981;
            --danger: #EF4444; --warning: #F59E0B; --info: #3B82F6;
            --shadow: 0 4px 16px rgba(0,0,0,0.06); --radius: 16px; --radius-lg: 24px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(180deg, #F8FAFC 0%, #F1F5F9 100%); min-height: 100vh; -webkit-font-smoothing: antialiased; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; margin-bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid rgba(226,232,240,0.5); }
        .app-header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #0F172A, #1E293B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
        .badge { padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .badge-dark { background: var(--primary); color: white; }
        .tabs-wrapper { position: relative; margin-bottom: 20px; }
        .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; padding-bottom: 6px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 16px; background: none; border: none; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
        .tab.active { color: var(--text); border-bottom-color: var(--gold); }
        .scroll-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; background: white; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; font-size: 14px; font-weight: 700; color: var(--text); }
        .scroll-arrow.left { left: -16px; } .scroll-arrow.right { right: -16px; } .scroll-arrow.hidden { display: none; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .sub-tab { padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: white; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .sub-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-chip { padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: white; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .card { background: var(--card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid rgba(226,232,240,0.5); }
        .sub-content { display: none; } .sub-content.active { display: block; }
        .task-card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
        .task-card:hover { box-shadow: var(--shadow); } .task-card:active { transform: scale(0.98); }
        .task-card.priority-high { border-left: 4px solid var(--danger); } .task-card.priority-medium { border-left: 4px solid var(--warning); } .task-card.priority-low { border-left: 4px solid var(--success); }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .task-title { font-size: 15px; font-weight: 700; color: var(--text); }
        .task-description { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
        .task-meta { display: flex; justify-content: space-between; font-size: 11px; color: #94A3B8; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-green { background: #D1FAE5; color: #065F46; } .tag-yellow { background: #FEF3C7; color: #92400E; } .tag-red { background: #FEE2E2; color: #991B1B; } .tag-blue { background: #DBEAFE; color: #1E40AF; } .tag-purple { background: #F3E8FF; color: #6B21A8; }
        .type-tag { padding: 3px 10px; border-radius: 30px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .type-report_review { background: #F3E8FF; color: #6B21A8; } .type-issue { background: #FEE2E2; color: #991B1B; } .type-order_review { background: #D1FAE5; color: #065F46; } .type-payment { background: #FEF3C7; color: #92400E; } .type-letter { background: #DBEAFE; color: #1E40AF; } .type-task { background: #F1F5F9; color: #475569; }
        .btn { padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.97); } .btn-primary { background: linear-gradient(135deg, #0F172A, #1E293B); color: white; width: 100%; padding: 14px; border-radius: 14px; } .btn-success { background: #D1FAE5; color: #065F46; } .btn-danger { background: #FEE2E2; color: #991B1B; } .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 8px; } .btn-outline { background: white; border: 1.5px solid var(--border); color: var(--text); }
        .form-group { margin-bottom: 16px; } .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; } .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 14px; background: white; font-family: inherit; transition: all 0.2s; } .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; } .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); } .empty-state { text-align: center; padding: 48px 20px; background: white; border-radius: var(--radius-lg); color: var(--text-secondary); border: 2px dashed var(--border); }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: white; border-radius: var(--radius-lg); padding: 24px; max-width: 520px; width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; } .modal-title { font-size: 20px; font-weight: 800; color: var(--text); } .modal-close { width: 36px; height: 36px; border-radius: 50%; background: #F1F5F9; border: none; font-size: 18px; cursor: pointer; }
        .calc-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; } .calc-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); } .calc-table td:last-child { text-align: right; font-weight: 600; } .calc-table .total-row { background: #F8FAFC; font-weight: 700; font-size: 15px; } .calc-table .negative { color: var(--danger); }
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; padding: 14px 24px; border-radius: 14px; font-weight: 600; font-size: 14px; max-width: 90%; text-align: center; transition: all 0.3s ease; opacity: 0; pointer-events: none; } .message.success { background: #D1FAE5; color: #065F46; border: 2px solid #A7F3D0; opacity: 1; } .message.error { background: #FEE2E2; color: #991B1B; border: 2px solid #FECACA; opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header"><h1>📋 Задачи</h1><span class="badge badge-dark" id="role-badge">Загрузка...</span></div>
        <div class="tabs-wrapper">
            <div class="scroll-arrow left hidden" id="scroll-left">◀</div>
            <div class="tabs" id="tabs-container">
                <button class="tab active" data-tab="reports">📑 Отчёты</button>
                <button class="tab" data-tab="all-tasks">⚠️ Все задачи</button>
                <button class="tab" data-tab="finance">💰 Финансы</button>
                <button class="tab" data-tab="letters-issues">✉️ Письма и проблемы</button>
            </div>
            <div class="scroll-arrow right" id="scroll-right">▶</div>
        </div>
        <div id="tab-reports" class="tab-content active">
            <div class="sub-tabs"><button class="sub-tab active" data-sub="pending-reports">⏳ На проверке</button><button class="sub-tab" data-sub="completed-reports">✅ Проверенные</button></div>
            <div id="sub-pending-reports" class="sub-content active"></div><div id="sub-completed-reports" class="sub-content"></div>
        </div>
        <div id="tab-all-tasks" class="tab-content">
            <button class="btn btn-primary" id="create-task-btn" style="margin-bottom:16px;">➕ Создать задачу</button>
            <div class="filter-bar"><button class="filter-chip active" data-filter="all">Все</button><button class="filter-chip" data-filter="pending">⏳ Ожидают</button><button class="filter-chip" data-filter="in_progress">🔵 В работе</button><button class="filter-chip" data-filter="completed">✅ Готово</button></div>
            <div id="all-tasks-list"></div>
        </div>
        <div id="tab-finance" class="tab-content">
            <div class="sub-tabs"><button class="sub-tab active" data-sub="finance-expenses">💰 Расходы</button><button class="sub-tab" data-sub="finance-orders">📋 Наряды</button><button class="sub-tab" data-sub="finance-advances">💸 Авансы</button><button class="sub-tab" data-sub="finance-plan">📊 Утверждённые</button></div>
            <div id="sub-finance-expenses" class="sub-content active"></div><div id="sub-finance-orders" class="sub-content"></div><div id="sub-finance-advances" class="sub-content"></div><div id="sub-finance-plan" class="sub-content"></div>
        </div>
        <div id="tab-letters-issues" class="tab-content">
            <div class="sub-tabs"><button class="sub-tab active" data-sub="letters-list">✉️ Письма</button><button class="sub-tab" data-sub="issues-list">⚠️ Проблемы</button></div>
            <div id="sub-letters-list" class="sub-content active"></div><div id="sub-issues-list" class="sub-content"></div>
        </div>
    </div>
    <div id="modal" class="modal hidden"><div class="modal-content"><div class="modal-header"><span class="modal-title" id="modal-title">Форма</span><button class="modal-close" id="modal-close">✕</button></div><div id="modal-content"></div></div></div>
    <div id="message" class="message"></div>

<script>
(function() {
    const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
    const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let userId = tg.initDataUnsafe?.user?.id || 531738802;
    let currentUser = null, currentRole = 'worker', currentTaskFilter = 'all';
    
    function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]||c;}); }
    function formatDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}); }
    function formatDateShort(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('ru-RU'); }
    function formatMoney(a) { return (a||0).toLocaleString() + ' ₸'; }
    function showMessage(text, type) { const msg = document.getElementById('message'); msg.textContent = text; msg.className = 'message ' + type; setTimeout(function() { msg.className = 'message'; }, 3000); }
    
    async function init() { await loadUser(); setupTabs(); setupTabsScroll(); setupSubTabs(); setupFilters(); setupModals(); loadAll(); }
    async function loadUser() { const { data } = await supabase.from('users').select('*').eq('telegram_id', userId).single(); if (data) { currentUser = data; currentRole = data.role; } document.getElementById('role-badge').textContent = currentRole === 'manager' ? '👑 Руководитель' : currentRole === 'worker' ? '👷 ИТР' : '🧾 Бухгалтер'; }
    
    function setupTabs() { document.querySelectorAll('#tabs-container .tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('#tabs-container .tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); this.classList.add('active'); document.getElementById('tab-' + this.dataset.tab).classList.add('active'); loadAll(); }); }); }
    
    function setupTabsScroll() { const tabsContainer = document.getElementById('tabs-container'); const scrollLeft = document.getElementById('scroll-left'); const scrollRight = document.getElementById('scroll-right'); if (!tabsContainer) return; function updateArrows() { if (scrollLeft) scrollLeft.classList.toggle('hidden', tabsContainer.scrollLeft <= 0); if (scrollRight) scrollRight.classList.toggle('hidden', tabsContainer.scrollLeft >= tabsContainer.scrollWidth - tabsContainer.clientWidth - 1); } if (scrollLeft) scrollLeft.addEventListener('click', function() { tabsContainer.scrollBy({ left: -200, behavior: 'smooth' }); }); if (scrollRight) scrollRight.addEventListener('click', function() { tabsContainer.scrollBy({ left: 200, behavior: 'smooth' }); }); tabsContainer.addEventListener('scroll', updateArrows); window.addEventListener('resize', updateArrows); setTimeout(updateArrows, 300); }
    
    function setupSubTabs() { document.querySelectorAll('.sub-tab').forEach(st => { st.addEventListener('click', function() { const parent = this.closest('.tab-content'); parent.querySelectorAll('.sub-tab').forEach(s => s.classList.remove('active')); parent.querySelectorAll('.sub-content').forEach(s => s.classList.remove('active')); this.classList.add('active'); const targetId = 'sub-' + this.dataset.sub; const target = document.getElementById(targetId); if (target) target.classList.add('active'); loadAll(); }); }); }
    
    function setupFilters() { document.querySelectorAll('.filter-chip').forEach(chip => { chip.addEventListener('click', function() { document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); this.classList.add('active'); currentTaskFilter = this.dataset.filter; loadAllTasks(); }); }); document.getElementById('create-task-btn')?.addEventListener('click', openCreateTaskForm); }
    
    function setupModals() { document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal').classList.add('hidden')); document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); }); }
    
    function openModal(title, content) { document.getElementById('modal-title').textContent = title; document.getElementById('modal-content').innerHTML = content; document.getElementById('modal').classList.remove('hidden'); }
    
    const typeLabels = { 'report_review': '📑 Отчёт', 'issue': '⚠️ Проблема', 'order_review': '📋 Наряд', 'payment': '💰 Платёж', 'letter': '✉️ Письмо', 'task': '📌 Задача' };
    const statusLabels = { 'pending': '⏳ Ожидает', 'in_progress': '🔵 В работе', 'completed': '✅ Сделано' };
    const statusTags = { 'pending': 'tag-yellow', 'in_progress': 'tag-blue', 'completed': 'tag-green' };
    
    function loadAll() { loadPendingReports(); loadCompletedReports(); loadAllTasks(); loadFinanceExpenses(); loadFinanceOrders(); loadFinanceAdvances(); loadFinancePlan(); loadLetters(); loadIssues(); }
    
    // ========== ОТЧЁТЫ ==========
    async function loadPendingReports() {
        const c = document.getElementById('sub-pending-reports'); c.innerHTML = '<div class="loading"></div>';
        const { data } = await supabase.from('object_reports').select('*, projects(name)').eq('status', 'pending').order('report_date', { ascending: false });
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет отчётов на проверке</div>'; return; }
        c.innerHTML = data.map(r => `<div class="task-card" onclick="viewReportDetail('${r.id}')"><div class="task-header"><span class="type-tag type-report_review">📑 Отчёт №${r.report_number||'—'}</span><span class="tag tag-yellow">⏳ На проверке</span></div><div class="task-title">${escapeHtml(r.projects?.name||'—')}</div><div class="task-description">📅 ${formatDate(r.report_date)} | 📝 ${(r.description||'').substring(0,80)}</div><div class="task-meta"><span>👤 ${r.created_by_name||'—'}</span></div></div>`).join('');
    }
    
    async function loadCompletedReports() {
        const c = document.getElementById('sub-completed-reports'); c.innerHTML = '<div class="loading"></div>';
        const { data } = await supabase.from('object_reports').select('*, projects(name)').eq('status', 'confirmed').order('report_date', { ascending: false });
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет проверенных отчётов</div>'; return; }
        c.innerHTML = data.map(r => `<div class="task-card" onclick="viewReportDetail('${r.id}')"><div class="task-header"><span class="type-tag type-report_review">📑 Отчёт №${r.report_number||'—'}</span><span class="tag tag-green">✅ Проверен</span></div><div class="task-title">${escapeHtml(r.projects?.name||'—')}</div><div class="task-description">📅 ${formatDate(r.report_date)}</div><div class="task-meta"><span>👤 ${r.created_by_name||'—'}</span></div></div>`).join('');
    }
    
    window.viewReportDetail = async function(id) {
        const { data: r } = await supabase.from('object_reports').select('*, projects(name)').eq('id', id).single();
        if (!r) return;
        const photos = r.photos || [];
        let html = `<div style="margin-bottom:12px;"><strong>📄 Отчёт №${r.report_number||'—'} от ${formatDate(r.report_date)}</strong></div><div>🏗️ ${escapeHtml(r.projects?.name||'—')}</div><div>📍 Оси: ${(r.axes_selected||[]).join(', ')||'—'}</div><div style="background:#F8FAFC;padding:12px;border-radius:12px;margin:12px 0;">📝 ${escapeHtml(r.description||'—')}</div>`;
        if (photos.length) { html += '<div class="filter-bar">'; photos.forEach(p => { html += `<img src="${p.url}" style="width:80px;height:80px;object-fit:cover;border-radius:12px;cursor:pointer;" onclick="window.open('${p.url}','_blank')">`; }); html += '</div>'; }
        if (r.status === 'pending' && currentRole === 'manager') { html += `<button class="btn btn-success" onclick="confirmReport('${r.id}')" style="margin-top:12px;width:100%;">✅ Отметить проверенным</button>`; }
        html += `<hr style="margin:16px 0;border-color:var(--border);"><h4 style="margin-bottom:12px;">📋 Создать задачу по отчёту</h4><div class="form-group"><label class="form-label">Название задачи</label><input type="text" id="report-task-title" class="form-input" value="Доработать отчёт №${r.report_number||'—'}"></div><div class="form-group"><label class="form-label">Описание</label><textarea id="report-task-desc" class="form-input" rows="2">По отчёту от ${formatDate(r.report_date)}</textarea></div><div class="form-group"><label class="form-label">Ответственный</label><select id="report-task-responsible" class="form-input"></select></div><div class="form-group"><label class="form-label">📎 Прикрепить файлы</label><input type="file" id="report-task-files" class="form-input" multiple accept=".pdf,.jpg,.jpeg,.png"></div><button class="btn btn-primary" id="create-report-task-btn">📤 Создать задачу</button>`;
        openModal('📑 Отчёт №' + (r.report_number||'—'), html);
        const { data: users } = await supabase.from('users').select('id,full_name,role').in('role',['manager','worker']).order('full_name');
        const sel = document.getElementById('report-task-responsible');
        if (sel && users) { sel.innerHTML = users.map(u => `<option value="${u.id}">${u.full_name} (${u.role==='manager'?'Руководитель':'ИТР'})</option>`).join(''); }
        const createBtn = document.getElementById('create-report-task-btn');
        if (createBtn) {
            createBtn.onclick = async function() {
                const title = document.getElementById('report-task-title').value.trim();
                const desc = document.getElementById('report-task-desc').value.trim();
                const respId = document.getElementById('report-task-responsible').value;
                const respName = document.getElementById('report-task-responsible').selectedOptions[0]?.text||'';
                if (!title) { alert('Введите название задачи'); return; }
                const files = document.getElementById('report-task-files').files;
                const fileUrls = [];
                for (const file of files) {
                    const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
                    const fileName = 'tasks/' + Date.now() + '_' + cleanName;
                    const { error: uploadError } = await supabase.storage.from('reports').upload(fileName, file, { cacheControl: '3600', upsert: false });
                    if (!uploadError) { const { data: urlData } = supabase.storage.from('reports').getPublicUrl(fileName); fileUrls.push({ name: file.name, url: urlData.publicUrl }); }
                }
                await supabase.from('custom_tasks').insert({ project_id: r.project_id, title: '📑 ' + title, description: desc + (fileUrls.length ? '\n\n📎 Файлы: ' + fileUrls.map(f => f.name).join(', ') : ''), status: 'pending', priority: 'high', type: 'report_review', responsible_ids: [respId], responsible_names: [respName], created_by: currentUser?.id, created_by_name: currentUser?.full_name, created_at: new Date(), files: fileUrls });
                document.getElementById('modal').classList.add('hidden'); showMessage('✅ Задача создана','success'); loadAll();
            };
        }

    async function uploadFile(file, folder) {
        const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const fileName = folder + '/' + Date.now() + '_' + cleanName;
        const { data, error } = await supabase.storage.from('reports').upload(fileName, file, { cacheControl: '3600', upsert: false });
        if (error) throw new Error('Ошибка загрузки: ' + error.message);
        const { data: urlData } = supabase.storage.from('reports').getPublicUrl(fileName);
        return { url: urlData.publicUrl, name: file.name };
    }

        openModal('💸 Карточка аванса', html);
        
        const saveBtn = document.getElementById('save-advance-btn');
        if (saveBtn) { saveBtn.onclick = async function() { saveBtn.textContent = '⏳ Сохранение...'; saveBtn.disabled = true; try { const invFile = document.getElementById('adv-invoice-file').files[0]; let updateData = { comment: document.getElementById('adv-comment').value }; if (invFile) { const result = await uploadFile(invFile, 'invoices'); updateData.invoice_file_url = result.url; updateData.invoice_file_name = result.name; } const { error } = await supabase.from('advances').update(updateData).eq('id', id); if (error) throw error; document.getElementById('modal').classList.add('hidden'); showMessage('✅ Данные сохранены','success'); loadAll(); } catch(err) { showMessage('Ошибка: ' + err.message, 'error'); saveBtn.textContent = '💾 Сохранить'; saveBtn.disabled = false; } }; }
        
        const approveBtn = document.getElementById('approve-advance-btn');
        if (approveBtn) { approveBtn.onclick = async function() { if (!confirm('✅ Утвердить аванс? Он попадёт в план оплат.')) return; approveBtn.textContent = '⏳ Утверждение...'; approveBtn.disabled = true; try { const invFile = document.getElementById('adv-invoice-file').files[0]; let updateData = { status: 'approved', approved_by: currentUser?.id, approved_at: new Date(), comment: document.getElementById('adv-comment').value }; if (invFile) { const result = await uploadFile(invFile, 'invoices'); updateData.invoice_file_url = result.url; updateData.invoice_file_name = result.name; } const { error } = await supabase.from('advances').update(updateData).eq('id', id); if (error) throw error; document.getElementById('modal').classList.add('hidden'); showMessage('✅ Аванс утверждён','success'); loadAll(); } catch(err) { showMessage('Ошибка: ' + err.message, 'error'); approveBtn.textContent = '✅ Утвердить аванс'; approveBtn.disabled = false; } }; }
    };
    
    // ========== ФИНАНСЫ: УТВЕРЖДЁННЫЕ ==========
    async function loadFinancePlan() {
        const c = document.getElementById('sub-finance-plan'); c.innerHTML = '<div class="loading"></div>';
        const [eR, oR, aR] = await Promise.all([ supabase.from('expenses').select('*, projects(name)').or('payment_status.eq.approved,payment_status.eq.paid').order('date',{ascending:false}), supabase.from('work_orders').select('*, projects(name), brigades(name)').eq('status','approved').order('created_at',{ascending:false}), supabase.from('advances').select('*, projects(name), brigades(name)').eq('status','approved').order('created_at',{ascending:false}) ]);
        const all = [ ...(eR.data||[]).map(e=>({...e,itemType:'expense',displayAmount:e.amount,displayName:e.name})), ...(oR.data||[]).map(o=>({...o,itemType:'order',displayAmount:o.total_amount,displayName:o.work_type||'Наряд'})), ...(aR.data||[]).map(a=>({...a,itemType:'advance',displayAmount:a.amount,displayName:'Аванс'})) ];
        if (!all.length) { c.innerHTML = '<div class="empty-state">Нет утверждённых операций</div>'; return; }
        c.innerHTML = all.map(item => { const isPaid = item.payment_status === 'paid' || item.status === 'paid'; const tl = item.itemType==='expense'?'💰 Расход':item.itemType==='order'?'📋 Наряд':'💸 Аванс'; const tt = item.itemType==='expense'?'type-payment':item.itemType==='order'?'type-order_review':'type-payment'; return `<div class="task-card" onclick="openApprovedCard('${item.itemType}','${item.id}')"><div class="task-header"><span class="type-tag ${tt}">${tl}</span><span class="tag ${isPaid?'tag-green':'tag-blue'}">${isPaid?'💳 Оплачен':'✅ Утверждён'}</span></div><div class="task-title">${escapeHtml(item.displayName)} — ${formatMoney(item.displayAmount)}</div><div class="task-description">🏗️ ${escapeHtml(item.projects?.name||'—')} ${item.brigades?.name?'| 👷 '+escapeHtml(item.brigades.name):''}</div><div class="task-meta"><span>📅 ${formatDateShort(item.approved_at||item.date)}</span></div></div>`; }).join('');
    }
    
    window.openApprovedCard = async function(type, id) {
        if (type === 'expense') {
            const { data: e } = await supabase.from('expenses').select('*, projects(name)').eq('id',id).single(); if (!e) return;
            let html = `<div><strong>💰 ${escapeHtml(e.name)}</strong></div><div>🏗️ ${escapeHtml(e.projects?.name||'—')}</div><div>💰 ${formatMoney(e.amount)} | ${e.payment_status==='paid'?'💳 Оплачен':'✅ Утверждён'}</div>${e.invoice_file_url ? `<div style="margin-top:8px;">📎 <a href="${e.invoice_file_url}" target="_blank">${escapeHtml(e.invoice_file_name||'Счёт')}</a></div>` : ''}`;
            if (currentRole === 'manager') { html += `<div class="form-group" style="margin-top:12px;"><label class="form-label">Статус</label><select id="approved-status" class="form-input"><option value="approved" ${e.payment_status==='approved'?'selected':''}>✅ Утверждён</option><option value="paid" ${e.payment_status==='paid'?'selected':''}>💳 Оплачен</option></select></div><button class="btn btn-primary" id="save-approved-btn">💾 Сохранить</button>`; }
            openModal('💰 Расход', html);
            const saveBtn = document.getElementById('save-approved-btn');
            if (saveBtn) { saveBtn.onclick = async function() { await supabase.from('expenses').update({payment_status:document.getElementById('approved-status').value}).eq('id',id); document.getElementById('modal').classList.add('hidden'); showMessage('✅ Обновлено','success'); loadAll(); }; }
        } else {
            const { data: o } = await supabase.from('work_orders').select('*, projects(name), brigades(name)').eq('id',id).single(); if (!o) return;
            let html = `<div><strong>📋 ${escapeHtml(o.work_type||'Наряд')}</strong></div><div>👷 ${escapeHtml(o.brigades?.name||'—')} | 🏗️ ${escapeHtml(o.projects?.name||'—')}</div><div>💰 ${formatMoney(o.total_amount)} | ${o.payment_status==='paid'?'💳 Выплачен':'✅ Утверждён'}</div>${o.invoice_file_url ? `<div style="margin-top:8px;">📎 <a href="${o.invoice_file_url}" target="_blank">${escapeHtml(o.invoice_file_name||'Счёт')}</a></div>` : ''}`;
            if (currentRole === 'manager') { html += `<div class="form-group" style="margin-top:12px;"><label class="form-label">Статус</label><select id="approved-status" class="form-input"><option value="approved" ${o.payment_status!=='paid'?'selected':''}>✅ Утверждён</option><option value="paid" ${o.payment_status==='paid'?'selected':''}>💳 Оплачен</option></select></div><button class="btn btn-primary" id="save-approved-btn">💾 Сохранить</button>`; }
            openModal('📋 Наряд', html);
            const saveBtn = document.getElementById('save-approved-btn');
            if (saveBtn) { saveBtn.onclick = async function() { const newStatus = document.getElementById('approved-status').value; await supabase.from('work_orders').update({ payment_status: newStatus, payment_date: newStatus==='paid'?new Date().toISOString().split('T')[0]:null }).eq('id',id); document.getElementById('modal').classList.add('hidden'); showMessage('✅ Обновлено','success'); loadAll(); }; }
        }
    };
    
    // ========== ПИСЬМА ==========
    async function loadLetters() {
        const c = document.getElementById('sub-letters-list'); c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('letters').select('*, projects(name)').eq('status','sent_to_office').order('created_at',{ascending:false});
        if (currentRole !== 'manager') { const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id); const ids = up?.map(p=>p.id)||[]; if (ids.length) q = q.in('project_id',ids); }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет писем</div>'; return; }
        c.innerHTML = data.map(l => `<div class="task-card"><div class="task-header"><span class="type-tag type-letter">✉️ Письмо</span><span class="tag tag-yellow">⏳ К отправке</span></div><div class="task-title">№${escapeHtml(l.letter_number_full)} — ${escapeHtml(l.projects?.name||'—')}</div><div class="task-description">${escapeHtml(l.delay_description||'—')}</div><div class="task-meta"><span>📅 ${formatDateShort(l.created_at?.split('T')[0])}</span><button class="btn btn-success btn-sm" onclick="event.stopPropagation();markLetterSent('${l.id}')">📨 Отправить</button></div></div>`).join('');
    }
    
    window.markLetterSent = async function(id) { await supabase.from('letters').update({status:'sent_to_customer',sent_to_customer:true}).eq('id',id); showMessage('✅ Письмо отправлено','success'); loadLetters(); };
    
    // ========== ПРОБЛЕМЫ ==========
    async function loadIssues() {
        const c = document.getElementById('sub-issues-list'); c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('project_issues').select('*, projects(name)').in('status',['open','in_progress','overdue']).order('created_at',{ascending:false});
        if (currentRole !== 'manager') { const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id); const ids = up?.map(p=>p.id)||[]; if (ids.length) q = q.in('project_id',ids); }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет проблем</div>'; return; }
        c.innerHTML = data.map(issue => { const si = {open:'🟡',in_progress:'🔵',overdue:'🔴'}[issue.status]||'🟡'; const tc = issue.status==='overdue'?'tag-red':issue.status==='in_progress'?'tag-blue':'tag-yellow'; return `<div class="task-card priority-${issue.priority||'medium'}"><div class="task-header"><span class="type-tag type-issue">⚠️ Проблема</span><span class="tag ${tc}">${si} ${issue.status==='overdue'?'Просрочена':issue.status==='in_progress'?'В работе':'Открыта'}</span></div><div class="task-title">${escapeHtml(issue.title)}</div><div class="task-description">🏗️ ${escapeHtml(issue.projects?.name||'—')} | ${escapeHtml((issue.description||'').substring(0,80))}</div><div class="task-meta"><span>👤 ${issue.created_by_name||'—'}</span></div></div>`; }).join('');
    }
    
    init();
})();
</script>
</body>
</html>

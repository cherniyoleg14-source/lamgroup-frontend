<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Задачи | LamGroup</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --gold: #F59E0B;
            --primary: #0F172A;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-lg: 24px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(180deg, #F8FAFC 0%, #F1F5F9 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: 16px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(226,232,240,0.5);
        }
        
        .app-header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #0F172A, #1E293B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        
        .badge-dark { background: var(--primary); color: white; }
        
        .tabs-wrapper { position: relative; margin-bottom: 20px; }
        
        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding-bottom: 6px;
        }
        
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 10px 16px;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--gold);
        }
        
        .scroll-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        
        .scroll-arrow.left { left: -16px; }
        .scroll-arrow.right { right: -16px; }
        .scroll-arrow.hidden { display: none; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .sub-tab {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .sub-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-chip {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(226,232,240,0.5);
        }
        
        .sub-content { display: none; }
        .sub-content.active { display: block; }
        
        .task-card {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .task-card:hover { box-shadow: var(--shadow); }
        .task-card:active { transform: scale(0.98); }
        
        .task-card.priority-high { border-left: 4px solid var(--danger); }
        .task-card.priority-medium { border-left: 4px solid var(--warning); }
        .task-card.priority-low { border-left: 4px solid var(--success); }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .task-title { font-size: 15px; font-weight: 700; color: var(--text); }
        .task-description { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
        .task-meta { display: flex; justify-content: space-between; font-size: 11px; color: #94A3B8; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        
        .tag {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .tag-green { background: #D1FAE5; color: #065F46; }
        .tag-yellow { background: #FEF3C7; color: #92400E; }
        .tag-red { background: #FEE2E2; color: #991B1B; }
        .tag-blue { background: #DBEAFE; color: #1E40AF; }
        .tag-purple { background: #F3E8FF; color: #6B21A8; }
        
        .type-tag {
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .type-report_review { background: #F3E8FF; color: #6B21A8; }
        .type-issue { background: #FEE2E2; color: #991B1B; }
        .type-order_review { background: #D1FAE5; color: #065F46; }
        .type-payment { background: #FEF3C7; color: #92400E; }
        .type-letter { background: #DBEAFE; color: #1E40AF; }
        .type-task { background: #F1F5F9; color: #475569; }
        
        .btn {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #0F172A, #1E293B); color: white; width: 100%; padding: 14px; }
        .btn-success { background: #D1FAE5; color: #065F46; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            background: white;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            background: white;
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            border: 2px dashed var(--border);
        }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title { font-size: 20px; font-weight: 800; color: var(--text); }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #F1F5F9;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            max-width: 90%;
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .message.success { background: #D1FAE5; color: #065F46; border: 2px solid #A7F3D0; opacity: 1; }
        .message.error { background: #FEE2E2; color: #991B1B; border: 2px solid #FECACA; opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1>📋 Задачи</h1>
            <span class="badge badge-dark" id="role-badge">Загрузка...</span>
        </div>
        
        <div class="tabs-wrapper">
            <div class="scroll-arrow left hidden" id="scroll-left">◀</div>
            <div class="tabs" id="tabs-container">
                <button class="tab active" data-tab="reports">📑 Отчёты</button>
                <button class="tab" data-tab="all-tasks">⚠️ Все задачи</button>
                <button class="tab" data-tab="finance">💰 Финансы</button>
                <button class="tab" data-tab="letters-issues">✉️ Письма и проблемы</button>
            </div>
            <div class="scroll-arrow right" id="scroll-right">▶</div>
        </div>
        
        <!-- Отчёты -->
        <div id="tab-reports" class="tab-content active">
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="pending-reports">⏳ На проверке</button>
                <button class="sub-tab" data-sub="completed-reports">✅ Проверенные</button>
            </div>
            <div id="sub-pending-reports" class="sub-content active"></div>
            <div id="sub-completed-reports" class="sub-content"></div>
        </div>
        
        <!-- Все задачи -->
        <div id="tab-all-tasks" class="tab-content">
            <button class="btn btn-primary" id="create-task-btn" style="margin-bottom:16px;">➕ Создать задачу</button>
            <div class="filter-bar">
                <button class="filter-chip active" data-filter="all">Все</button>
                <button class="filter-chip" data-filter="pending">⏳ Ожидают</button>
                <button class="filter-chip" data-filter="in_progress">🔵 В работе</button>
                <button class="filter-chip" data-filter="completed">✅ Готово</button>
            </div>
            <div id="all-tasks-list"></div>
        </div>
        
        <!-- Финансы -->
        <div id="tab-finance" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="finance-expenses">💰 Расходы</button>
                <button class="sub-tab" data-sub="finance-orders">📋 Наряды</button>
                <button class="sub-tab" data-sub="finance-advances">💸 Авансы</button>
                <button class="sub-tab" data-sub="finance-plan">📊 Утверждённые</button>
            </div>
            <div id="sub-finance-expenses" class="sub-content active"></div>
            <div id="sub-finance-orders" class="sub-content"></div>
            <div id="sub-finance-advances" class="sub-content"></div>
            <div id="sub-finance-plan" class="sub-content"></div>
        </div>
        
        <!-- Письма и проблемы -->
        <div id="tab-letters-issues" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="letters-list">✉️ Письма</button>
                <button class="sub-tab" data-sub="issues-list">⚠️ Проблемы</button>
            </div>
            <div id="sub-letters-list" class="sub-content active"></div>
            <div id="sub-issues-list" class="sub-content"></div>
        </div>
    </div>
    
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Форма</span>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>
    
    <div id="message" class="message"></div>

<script>
(function() {
    const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
    const SUPABASE_URL = 'https://owagntywpiymqhbfoxye.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWdudHl3cGl5bXFoYmZveHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg5MDUsImV4cCI6MjA5MTg5NDkwNX0.p-3xAhbFgH5lcGnbBfkcQQFVza_Yc2qoY6VBlhmmFGg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let userId = tg.initDataUnsafe?.user?.id || 531738802;
    let currentUser = null, currentRole = 'worker', currentTaskFilter = 'all';
    
    function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]||c;}); }
    function formatDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}); }
    function formatDateShort(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('ru-RU'); }
    
    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = 'message ' + type;
        setTimeout(function() { msg.className = 'message'; }, 3000);
    }
    
    async function init() {
        await loadUser();
        setupTabs();
        setupTabsScroll();
        setupSubTabs();
        setupFilters();
        setupModals();
        loadAll();
    }
    
    async function loadUser() {
        const { data } = await supabase.from('users').select('*').eq('telegram_id', userId).single();
        if (data) { currentUser = data; currentRole = data.role; }
        document.getElementById('role-badge').textContent = currentRole === 'manager' ? '👑 Руководитель' : '👷 ИТР';
    }
    
    function setupTabs() {
        document.querySelectorAll('#tabs-container .tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('#tabs-container .tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                loadAll();
            });
        });
    }
    
    function setupTabsScroll() {
        const tabsContainer = document.getElementById('tabs-container');
        const scrollLeft = document.getElementById('scroll-left');
        const scrollRight = document.getElementById('scroll-right');
        if (!tabsContainer) return;
        
        function updateArrows() {
            if (scrollLeft) scrollLeft.classList.toggle('hidden', tabsContainer.scrollLeft <= 0);
            if (scrollRight) scrollRight.classList.toggle('hidden', tabsContainer.scrollLeft >= tabsContainer.scrollWidth - tabsContainer.clientWidth - 1);
        }
        
        if (scrollLeft) scrollLeft.addEventListener('click', function() { tabsContainer.scrollBy({ left: -200, behavior: 'smooth' }); });
        if (scrollRight) scrollRight.addEventListener('click', function() { tabsContainer.scrollBy({ left: 200, behavior: 'smooth' }); });
        tabsContainer.addEventListener('scroll', updateArrows);
        window.addEventListener('resize', updateArrows);
        setTimeout(updateArrows, 300);
    }
    
    function setupSubTabs() {
        document.querySelectorAll('.sub-tab').forEach(st => {
            st.addEventListener('click', function() {
                const parent = this.closest('.tab-content');
                parent.querySelectorAll('.sub-tab').forEach(s => s.classList.remove('active'));
                parent.querySelectorAll('.sub-content').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                const targetId = 'sub-' + this.dataset.sub;
                const target = document.getElementById(targetId);
                if (target) target.classList.add('active');
                loadAll();
            });
        });
    }
    
    function setupFilters() {
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentTaskFilter = this.dataset.filter;
                loadAllTasks();
            });
        });
        
        document.getElementById('create-task-btn')?.addEventListener('click', openCreateTaskForm);
    }
    
    function setupModals() {
        document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal').classList.add('hidden'));
        document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); });
    }
    
    function openModal(title, content) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal').classList.remove('hidden');
    }
    
    const typeLabels = {
        'report_review': '📑 Отчёт',
        'issue': '⚠️ Проблема',
        'order_review': '📋 Наряд',
        'payment': '💰 Платёж',
        'letter': '✉️ Письмо',
        'task': '📌 Задача'
    };
    
    const statusLabels = {
        'pending': '⏳ Ожидает',
        'in_progress': '🔵 В работе',
        'completed': '✅ Сделано'
    };
    
    const statusTags = {
        'pending': 'tag-yellow',
        'in_progress': 'tag-blue',
        'completed': 'tag-green'
    };
    
    function loadAll() {
        loadPendingReports();
        loadCompletedReports();
        loadAllTasks();
        loadFinanceExpenses();
        loadFinanceOrders();
        loadFinanceAdvances();
        loadFinancePlan();
        loadLetters();
        loadIssues();
    }
    
    // ========== ОТЧЁТЫ ==========
    async function loadPendingReports() {
        const c = document.getElementById('sub-pending-reports');
        c.innerHTML = '<div class="loading"></div>';
        const { data } = await supabase.from('object_reports').select('*, projects(name)').eq('status', 'pending').order('report_date', { ascending: false });
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет отчётов на проверке</div>'; return; }
        c.innerHTML = data.map(r => `
            <div class="task-card" onclick="viewReportDetail('${r.id}')">
                <div class="task-header">
                    <span><span class="type-tag type-report_review">📑 Отчёт</span> №${r.report_number||'—'}</span>
                    <span class="tag tag-yellow">⏳ На проверке</span>
                </div>
                <div class="task-title">${escapeHtml(r.projects?.name||'—')}</div>
                <div class="task-description">📅 ${formatDate(r.report_date)} | 📝 ${(r.description||'').substring(0,80)}</div>
                <div class="task-meta"><span>👤 ${r.created_by_name||'—'}</span></div>
            </div>
        `).join('');
    }
    
    async function loadCompletedReports() {
        const c = document.getElementById('sub-completed-reports');
        c.innerHTML = '<div class="loading"></div>';
        const { data } = await supabase.from('object_reports').select('*, projects(name)').eq('status', 'confirmed').order('report_date', { ascending: false });
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет проверенных отчётов</div>'; return; }
        c.innerHTML = data.map(r => `
            <div class="task-card" onclick="viewReportDetail('${r.id}')">
                <div class="task-header">
                    <span><span class="type-tag type-report_review">📑 Отчёт</span> №${r.report_number||'—'}</span>
                    <span class="tag tag-green">✅ Проверен</span>
                </div>
                <div class="task-title">${escapeHtml(r.projects?.name||'—')}</div>
                <div class="task-description">📅 ${formatDate(r.report_date)}</div>
                <div class="task-meta"><span>👤 ${r.created_by_name||'—'}</span></div>
            </div>
        `).join('');
    }
    
    window.viewReportDetail = async function(id) {
        const { data: r } = await supabase.from('object_reports').select('*, projects(name)').eq('id', id).single();
        if (!r) return;
        const photos = r.photos || [];
        let html = `<div style="margin-bottom:12px;"><strong>📄 Отчёт №${r.report_number||'—'} от ${formatDate(r.report_date)}</strong></div>`;
        html += `<div>🏗️ ${escapeHtml(r.projects?.name||'—')}</div>`;
        html += `<div>📍 Оси: ${(r.axes_selected||[]).join(', ')||'—'}</div>`;
        html += `<div style="background:#F8FAFC;padding:12px;border-radius:12px;margin:12px 0;">📝 ${escapeHtml(r.description||'—')}</div>`;
        if (photos.length) {
            html += '<div class="filter-bar">';
            photos.forEach(p => { html += `<img src="${p.url}" style="width:80px;height:80px;object-fit:cover;border-radius:12px;cursor:pointer;" onclick="window.open('${p.url}','_blank')">`; });
            html += '</div>';
        }
        if (r.status === 'pending' && currentRole === 'manager') {
            html += `<button class="btn btn-success" onclick="confirmReport('${r.id}')" style="margin-top:12px;">✅ Отметить проверенным</button>`;
        }
        openModal('📑 Детали отчёта', html);
    };
    
    window.confirmReport = async function(id) {
        await supabase.from('object_reports').update({status:'confirmed',reviewed_by:currentUser?.id,reviewed_by_name:currentUser?.full_name}).eq('id',id);
        document.getElementById('modal').classList.add('hidden');
        showMessage('✅ Отчёт проверен','success');
        loadAll();
    };
    
    // ========== ВСЕ ЗАДАЧИ (custom_tasks) ==========
    async function loadAllTasks() {
        const c = document.getElementById('all-tasks-list');
        c.innerHTML = '<div class="loading"></div>';
        let query = supabase.from('custom_tasks').select('*, projects(name)').order('created_at', { ascending: false });
        if (currentTaskFilter !== 'all') query = query.eq('status', currentTaskFilter);
        if (currentRole !== 'manager') query = query.or(`created_by.eq.${currentUser?.id},responsible_ids.cs.{${currentUser?.id}}`);
        const { data } = await query;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет задач</div>'; return; }
        c.innerHTML = data.map(t => {
            const typeLabel = typeLabels[t.type] || '📌 Задача';
            const statusLabel = statusLabels[t.status] || t.status;
            const statusTag = statusTags[t.status] || 'tag-yellow';
            const priorityClass = t.priority === 'high' ? 'priority-high' : t.priority === 'medium' ? 'priority-medium' : 'priority-low';
            return `
            <div class="task-card ${priorityClass}" onclick="viewTaskDetail('${t.id}')">
                <div class="task-header">
                    <span class="type-tag type-${t.type||'task'}">${typeLabel}</span>
                    <span class="tag ${statusTag}">${statusLabel}</span>
                </div>
                <div class="task-title">${escapeHtml(t.title)}</div>
                <div class="task-description">${escapeHtml((t.description||'').substring(0,100))}</div>
                <div class="task-meta">
                    <span>📅 ${formatDateShort(t.created_at)}</span>
                    <span>👤 ${escapeHtml(t.created_by_name||'—')}</span>
                </div>
            </div>`;
        }).join('');
    }
    
    window.viewTaskDetail = async function(id) {
        const { data: t } = await supabase.from('custom_tasks').select('*, projects(name)').eq('id', id).single();
        if (!t) return;
        let html = `<div style="margin-bottom:12px;"><strong>${escapeHtml(t.title)}</strong></div>`;
        html += `<div>📝 ${escapeHtml(t.description||'—')}</div>`;
        if (t.projects?.name) html += `<div>🏗️ ${escapeHtml(t.projects.name)}</div>`;
        html += `<div>👤 Создал: ${t.created_by_name||'—'}</div>`;
        html += `<div class="form-group" style="margin-top:16px;"><label class="form-label">Статус</label><select id="task-status" class="form-input"><option value="pending" ${t.status==='pending'?'selected':''}>⏳ Ожидает</option><option value="in_progress" ${t.status==='in_progress'?'selected':''}>🔵 В работе</option><option value="completed" ${t.status==='completed'?'selected':''}>✅ Сделано</option></select></div>`;
        html += `<button class="btn btn-primary" id="update-task-btn">💾 Обновить</button>`;
        openModal('📌 Задача', html);
        document.getElementById('update-task-btn').onclick = async function() {
            await supabase.from('custom_tasks').update({status:document.getElementById('task-status').value,updated_at:new Date()}).eq('id',id);
            document.getElementById('modal').classList.add('hidden');
            showMessage('✅ Обновлено','success');
            loadAllTasks();
        };
    };
    
    async function openCreateTaskForm() {
        const today = new Date().toISOString().split('T')[0];
        const { data: projects } = await supabase.from('projects').select('id,name').order('name');
        const { data: users } = await supabase.from('users').select('id,full_name').order('full_name');
        let html = `
            <div class="form-group"><label class="form-label">Название *</label><input type="text" id="ct-title" class="form-input"></div>
            <div class="form-group"><label class="form-label">Описание</label><textarea id="ct-desc" class="form-input" rows="2"></textarea></div>
            <div class="form-group"><label class="form-label">Объект</label><select id="ct-project" class="form-input"><option value="">—</option>${(projects||[]).map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
            <div class="form-group"><label class="form-label">Приоритет</label><select id="ct-priority" class="form-input"><option value="low">Низкий</option><option value="medium" selected>Средний</option><option value="high">Высокий</option></select></div>
            <div class="form-group"><label class="form-label">Ответственный</label><select id="ct-responsible" class="form-input">${(users||[]).map(u => `<option value="${u.id}">${u.full_name}</option>`).join('')}</select></div>
            <button class="btn btn-primary" id="save-ct-btn">📤 Создать</button>
        `;
        openModal('➕ Новая задача', html);
        document.getElementById('save-ct-btn').onclick = async function() {
            const title = document.getElementById('ct-title').value.trim();
            if (!title) { alert('Введите название'); return; }
            const respId = document.getElementById('ct-responsible').value;
            const respName = document.getElementById('ct-responsible').selectedOptions[0]?.text||'';
            await supabase.from('custom_tasks').insert({
                project_id: document.getElementById('ct-project').value||null,
                title, description: document.getElementById('ct-desc').value,
                priority: document.getElementById('ct-priority').value,
                responsible_ids: [respId], responsible_names: [respName],
                status: 'pending', type: 'task',
                created_by: currentUser?.id, created_by_name: currentUser?.full_name,
                created_at: new Date()
            });
            document.getElementById('modal').classList.add('hidden');
            showMessage('✅ Задача создана','success');
            loadAllTasks();
        };
    }
    
    // ========== ФИНАНСЫ ==========
    async function loadFinanceExpenses() {
        const c = document.getElementById('sub-finance-expenses');
        c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('expenses').select('*, projects(name)').eq('payment_status','pending').order('date',{ascending:false});
        if (currentRole !== 'manager') {
            const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id);
            const ids = up?.map(p=>p.id)||[];
            if (ids.length) q = q.in('project_id',ids);
        }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет расходов</div>'; return; }
        c.innerHTML = data.map(e => `
            <div class="task-card">
                <div class="task-header">
                    <span class="type-tag type-payment">💰 Расход</span>
                    <span class="tag tag-yellow">⏳ Ожидает</span>
                </div>
                <div class="task-title">${escapeHtml(e.name)} — ${(e.amount||0).toLocaleString()} ₸</div>
                <div class="task-description">🏗️ ${escapeHtml(e.projects?.name||'—')} | 🏢 ${escapeHtml(e.supplier||'—')}</div>
                <div class="task-meta">
                    <span>📅 ${formatDateShort(e.date)}</span>
                    ${currentRole==='manager'?`<button class="btn btn-success btn-sm" onclick="approveExpense('${e.id}')">✅ Утвердить</button>`:''}
                </div>
            </div>
        `).join('');
    }
    
    window.approveExpense = async function(id) {
        await supabase.from('expenses').update({payment_status:'approved',approved_by:currentUser?.id,approved_at:new Date()}).eq('id',id);
        showMessage('✅ Расход утверждён','success');
        loadAll();
    };
    
    async function loadFinanceOrders() {
        const c = document.getElementById('sub-finance-orders');
        c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('work_orders').select('*, projects(name), brigades(name)').eq('status','pending').order('created_at',{ascending:false});
        if (currentRole !== 'manager') {
            const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id);
            const ids = up?.map(p=>p.id)||[];
            if (ids.length) q = q.in('project_id',ids);
        }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет нарядов</div>'; return; }
        c.innerHTML = data.map(o => `
            <div class="task-card">
                <div class="task-header">
                    <span class="type-tag type-order_review">📋 Наряд</span>
                    <span class="tag tag-yellow">⏳ Ожидает</span>
                </div>
                <div class="task-title">${escapeHtml(o.work_type||'Наряд')} — ${(o.total_amount||0).toLocaleString()} ₸</div>
                <div class="task-description">👷 ${escapeHtml(o.brigades?.name||'—')} | 🏗️ ${escapeHtml(o.projects?.name||'—')}</div>
                <div class="task-meta">
                    <span>📅 ${formatDateShort(o.created_at?.split('T')[0])}</span>
                    ${currentRole==='manager'?`<button class="btn btn-success btn-sm" onclick="approveOrder('${o.id}')">✅ Утвердить</button>`:''}
                </div>
            </div>
        `).join('');
    }
    
    window.approveOrder = async function(id) {
        await supabase.from('work_orders').update({status:'approved',approved_by:currentUser?.id,approved_at:new Date()}).eq('id',id);
        showMessage('✅ Наряд утверждён','success');
        loadAll();
    };
    
    async function loadFinanceAdvances() {
        const c = document.getElementById('sub-finance-advances');
        c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('advances').select('*, projects(name), brigades(name)').eq('status','pending').order('created_at',{ascending:false});
        if (currentRole !== 'manager') {
            const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id);
            const ids = up?.map(p=>p.id)||[];
            if (ids.length) q = q.in('project_id',ids);
        }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет авансов</div>'; return; }
        c.innerHTML = data.map(a => `
            <div class="task-card">
                <div class="task-header">
                    <span class="type-tag type-payment">💸 Аванс</span>
                    <span class="tag tag-yellow">⏳ Ожидает</span>
                </div>
                <div class="task-title">Аванс — ${(a.amount||0).toLocaleString()} ₸</div>
                <div class="task-description">👷 ${escapeHtml(a.brigades?.name||'—')} | 🏗️ ${escapeHtml(a.projects?.name||'—')}</div>
                <div class="task-meta">
                    <span>📅 ${formatDateShort(a.created_at?.split('T')[0])}</span>
                    ${currentRole==='manager'?`<button class="btn btn-success btn-sm" onclick="approveAdvanceFinance('${a.id}')">✅ Утвердить</button>`:''}
                </div>
            </div>
        `).join('');
    }
    
    window.approveAdvanceFinance = async function(id) {
        await supabase.from('advances').update({status:'approved',approved_by:currentUser?.id,approved_at:new Date()}).eq('id',id);
        showMessage('✅ Аванс утверждён','success');
        loadAll();
    };
    
    async function loadFinancePlan() {
        const c = document.getElementById('sub-finance-plan');
        c.innerHTML = '<div class="loading"></div>';
        const [eR, oR, aR] = await Promise.all([
            supabase.from('expenses').select('*, projects(name)').eq('payment_status','approved'),
            supabase.from('work_orders').select('*, projects(name), brigades(name)').eq('status','approved'),
            supabase.from('advances').select('*, projects(name), brigades(name)').eq('status','approved')
        ]);
        const all = [...(eR.data||[]).map(e=>({...e,itemType:'expense'})),...(oR.data||[]).map(o=>({...o,itemType:'order'})),...(aR.data||[]).map(a=>({...a,itemType:'advance'}))];
        if (!all.length) { c.innerHTML = '<div class="empty-state">Нет утверждённых операций</div>'; return; }
        c.innerHTML = all.map(item => `
            <div class="task-card">
                <div class="task-header">
                    <span class="type-tag type-${item.itemType==='expense'?'payment':item.itemType==='order'?'order_review':'payment'}">${item.itemType==='expense'?'💰 Расход':item.itemType==='order'?'📋 Наряд':'💸 Аванс'}</span>
                    <span class="tag tag-green">✅ Утверждён</span>
                </div>
                <div class="task-title">${escapeHtml(item.name||item.work_type||'Аванс')} — ${(item.amount||item.total_amount||0).toLocaleString()} ₸</div>
                <div class="task-description">🏗️ ${escapeHtml(item.projects?.name||'—')} ${item.brigades?.name?'| 👷 '+escapeHtml(item.brigades.name):''}</div>
            </div>
        `).join('');
    }
    
    // ========== ПИСЬМА ==========
    async function loadLetters() {
        const c = document.getElementById('sub-letters-list');
        c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('letters').select('*, projects(name)').eq('status','sent_to_office').order('created_at',{ascending:false});
        if (currentRole !== 'manager') {
            const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id);
            const ids = up?.map(p=>p.id)||[];
            if (ids.length) q = q.in('project_id',ids);
        }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет писем</div>'; return; }
        c.innerHTML = data.map(l => `
            <div class="task-card">
                <div class="task-header">
                    <span class="type-tag type-letter">✉️ Письмо</span>
                    <span class="tag tag-yellow">⏳ К отправке</span>
                </div>
                <div class="task-title">№${escapeHtml(l.letter_number_full)} — ${escapeHtml(l.projects?.name||'—')}</div>
                <div class="task-description">${escapeHtml(l.delay_description||'—')}</div>
                <div class="task-meta">
                    <span>📅 ${formatDateShort(l.created_at?.split('T')[0])}</span>
                    <button class="btn btn-success btn-sm" onclick="markLetterSent('${l.id}')">📨 Отправить</button>
                </div>
            </div>
        `).join('');
    }
    
    window.markLetterSent = async function(id) {
        await supabase.from('letters').update({status:'sent_to_customer',sent_to_customer:true}).eq('id',id);
        showMessage('✅ Письмо отправлено','success');
        loadLetters();
    };
    
    // ========== ПРОБЛЕМЫ ==========
    async function loadIssues() {
        const c = document.getElementById('sub-issues-list');
        c.innerHTML = '<div class="loading"></div>';
        let q = supabase.from('project_issues').select('*, projects(name)').in('status',['open','in_progress','overdue']).order('created_at',{ascending:false});
        if (currentRole !== 'manager') {
            const { data: up } = await supabase.from('projects').select('id').eq('responsible_worker_id',currentUser?.id);
            const ids = up?.map(p=>p.id)||[];
            if (ids.length) q = q.in('project_id',ids);
        }
        const { data } = await q;
        if (!data?.length) { c.innerHTML = '<div class="empty-state">Нет проблем</div>'; return; }
        c.innerHTML = data.map(issue => {
            const statusIcon = {open:'🟡',in_progress:'🔵',overdue:'🔴'}[issue.status]||'🟡';
            return `
            <div class="task-card priority-${issue.priority||'medium'}">
                <div class="task-header">
                    <span class="type-tag type-issue">⚠️ Проблема</span>
                    <span class="tag tag-${issue.status==='overdue'?'red':issue.status==='in_progress'?'blue':'yellow'}">${statusIcon} ${issue.status==='overdue'?'Просрочена':issue.status==='in_progress'?'В работе':'Открыта'}</span>
                </div>
                <div class="task-title">${escapeHtml(issue.title)}</div>
                <div class="task-description">🏗️ ${escapeHtml(issue.projects?.name||'—')} | ${escapeHtml((issue.description||'').substring(0,80))}</div>
                <div class="task-meta"><span>👤 ${issue.created_by_name||'—'}</span></div>
            </div>`;
        }).join('');
    }
    
    init();
})();
</script>
